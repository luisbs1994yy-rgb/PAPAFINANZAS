<style>
/* ══════════════════════════════════════════════════════════
   TOKENS
══════════════════════════════════════════════════════════ */
:root {
  --bg:           #060c16;
  --bg-card:      #0b1422;
  --bg-input:     #101d2e;
  --border:       #1a2d44;
  --border-hi:    #26405e;
  --t1:           #ddeeff;
  --t2:           #7da0c0;
  --t3:           #5a85a8;
  --accent:       #f5a623;
  --accent-glow:  rgba(245,166,35,.15);
  --green:        #22c55e;
  --red:          #ef4444;
  --blue:         #3b82f6;
  --purple:       #8b5cf6;
  --cyan:         #06b6d4;
  --u1:           #f5a623;   /* user 1 color — amber */
  --u2:           #22d3ee;   /* user 2 color — cyan  */
  --radius:       14px;
  --radius-sm:    8px;
}

*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}

/* Noise texture overlay */
body::before{content:'';position:fixed;inset:0;opacity:.03;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px}

/* ══════════════════════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════════════════════ */
#app{display:flex;min-height:100vh;flex-direction:column}

/* ── Header ── */
.header{
  background:linear-gradient(135deg,var(--bg-card),#0e1c30);
  border-bottom:1px solid var(--border);
  padding:14px 28px;display:flex;align-items:center;
  justify-content:space-between;gap:12px;flex-wrap:wrap;
}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--t1)}
.logo em{color:var(--accent);font-style:italic}
.logo-ver{font-size:11px;color:var(--t3);font-weight:500;font-family:'JetBrains Mono',monospace;margin-left:8px;vertical-align:middle;letter-spacing:.04em}
.header-center{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.month-btn{
  padding:4px 9px;border-radius:6px;border:none;cursor:pointer;
  font-size:11px;font-family:'JetBrains Mono',monospace;font-weight:500;
  background:var(--bg-input);color:var(--t3);transition:all .2s;
}
.month-btn.active{background:var(--accent);color:#000}
.year-tag{font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;margin-left:6px}
.header-right{display:flex;align-items:center;gap:10px}

/* ── Nav ── */
.nav{
  display:flex;border-bottom:1px solid var(--border);
  background:var(--bg-card);padding:0 28px;overflow-x:auto;
  scrollbar-width:none;
}
.sticky-top{position:sticky;top:0;z-index:50}
.nav::-webkit-scrollbar{display:none}
.nav-btn{
  padding:12px 16px;border:none;cursor:pointer;background:transparent;
  color:var(--t3);font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;
  border-bottom:2px solid transparent;transition:all .2s;margin-bottom:-1px;white-space:nowrap;
}
.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent)}
.nav-btn:hover:not(.active){color:var(--t2)}

/* ── Main content ── */
.main{padding:24px 28px;max-width:1280px;margin:0 auto;width:100%}

/* ── Panels ── */
.panel{display:none}
.panel.active{display:block}

/* ── Grid ── */
.g3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:14px;margin-bottom:16px}

/* ── Cards ── */
.card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px 22px}
.kpi-card{
  background:linear-gradient(135deg,var(--bg-card),#0f1f35);
  border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;
  border:1px solid var(--border);
}
.kpi-label{font-size:10px;color:var(--t3);font-family:'JetBrains Mono',monospace;letter-spacing:.6px}
.kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:700;margin-top:4px}
.kpi-sub{font-size:12px;color:var(--t3);margin-top:2px;font-family:'JetBrains Mono',monospace}
.section-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;color:var(--t1);margin-bottom:14px}

/* ── Form inputs ── */
.inp,.sel{
  background:var(--bg-input);border:1px solid var(--border-hi);
  border-radius:var(--radius-sm);padding:8px 12px;color:var(--t1);
  font-size:13px;font-family:'Outfit',sans-serif;outline:none;transition:border-color .2s;
}
.inp{width:100%}.sel{cursor:pointer;width:100%}
.inp:focus,.sel:focus{border-color:var(--accent)}
textarea.inp{min-height:90px;resize:vertical;line-height:1.6}

/* ── Buttons ── */
.btn{border:none;border-radius:var(--radius-sm);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-acc{background:var(--accent);color:#000}
.btn-acc:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border-hi);color:var(--t2)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-purple{background:var(--purple);color:#fff}
.btn-purple:hover{opacity:.85}
.btn-danger{background:#ef444415;border:1px solid #ef444430;color:var(--red)}
.btn-del{background:transparent;border:none;color:var(--t3);cursor:pointer;font-size:13px;padding:2px 6px;transition:color .15s}
.btn-del:hover{color:var(--red)}
.btn-edit-sm{background:transparent;border:1px solid var(--border-hi);border-radius:6px;color:var(--t2);cursor:pointer;font-size:11px;padding:3px 8px;font-family:'JetBrains Mono',monospace;transition:all .15s}
.btn-edit-sm:hover{border-color:var(--accent);color:var(--accent)}

/* ── Badge ── */
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-family:'JetBrains Mono',monospace}

/* ── Row ── */
.row-item{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 14px;border-radius:10px;margin-bottom:6px;
  background:var(--bg-input);border:1px solid var(--border);transition:border-color .2s;
}
.row-item:hover{border-color:var(--border-hi)}

/* ── Progress ── */
.prog-track{height:4px;border-radius:99px;background:var(--border);overflow:hidden}
.prog-fill{height:100%;border-radius:99px;transition:width .6s ease}

/* ── Drop zone ── */
.drop-zone{
  border:2px dashed var(--border-hi);border-radius:12px;padding:28px;
  text-align:center;background:var(--bg-input);cursor:pointer;transition:all .2s;margin-bottom:14px;
}
.drop-zone.over{border-color:var(--accent);background:var(--accent-glow)}
.drop-zone:hover{border-color:var(--border-hi)}

/* ── Bank buttons ── */
.bank-btn{
  padding:6px 14px;border-radius:8px;cursor:pointer;font-size:12px;
  font-family:'Outfit',sans-serif;font-weight:500;transition:all .15s;
  border:1px solid var(--border-hi);background:var(--bg-input);color:var(--t3);
}

/* ── Modal ── */
.modal-ov{
  position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);
  z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-box{
  background:var(--bg-card);border:1px solid var(--border-hi);border-radius:20px;
  padding:28px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,.6);
}

/* ── Spinner ── */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--purple);border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite}

/* ── Toast ── */
.toast{
  position:fixed;bottom:24px;right:24px;z-index:300;padding:12px 20px;border-radius:10px;
  font-size:13px;box-shadow:0 8px 32px rgba(0,0,0,.5);transform:translateY(80px);
  opacity:0;transition:all .3s ease;pointer-events:none;font-family:'Outfit',sans-serif;
}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#22c55e18;border:1px solid #22c55e44;color:var(--green)}
.toast.error{background:#ef444418;border:1px solid #ef444444;color:var(--red)}
.toast.info{background:#8b5cf618;border:1px solid #8b5cf644;color:var(--purple)}

/* ── Joint view ── */
.joint-col{flex:1;min-width:280px}
.joint-sep{width:1px;background:var(--border);flex-shrink:0}

/* ── Utilities ── */
.mono{font-family:'JetBrains Mono',monospace}
.serif{font-family:'Syne',sans-serif}
.flex{display:flex}.fw{flex-wrap:wrap}
.ai{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}.g12{gap:12px}.g16{gap:16px}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}
.tc{text-align:center}
.w100{width:100%}
.op0{opacity:0}

/* ── Loading overlay ── */
.loading-ov{
  position:fixed;inset:0;background:var(--bg);z-index:99;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.loading-ov.hidden{display:none}

/* Responsive */
@media(max-width:640px){
  .header{padding:12px 16px}.main{padding:16px}
  .nav{padding:0 16px}.g3,.g2{grid-template-columns:1fr}
  .modal-box{padding:20px}
}
/* Sentence case inputs */
.inp{text-transform:capitalize}
.inp::placeholder{text-transform:none}
@keyframes progressAnim {
  0%{width:0%} 40%{width:60%} 70%{width:80%} 100%{width:95%}
}

<!-- ══════ MAIN APP ══════ -->

<!-- editModal removed - now using inline edit -->

<script>
// ════════════════════════════════════════════════════════════
//  CONFIG — Pon tu URL de Apps Script aquí
// ════════════════════════════════════════════════════════════
const WEBHOOK = "https://script.google.com/macros/s/AKfycbzdiBg9iYvX-jhEY9L90sruyRd_mHO9iAGLiDSl5dyhy36N6sZ7fmAKO2ZthbB0Oq-Q/exec";
// Ejemplo: "https://script.google.com/macros/s/AKfycb.../exec"

/** Edición Papa: sube +0.01 por release → PAPA1.03, PAPA1.04, … */
const APP_VERSION = "PAPA1.02";
/** Identificador fijo para API y claves localStorage (sin pantalla de usuario). */
const APP_USER_ID = "Papa";

function applyAppVersion() {
  const el = document.getElementById("hdrVer");
  if (el) el.textContent = APP_VERSION;
  document.title = "MisFinanzas · " + APP_VERSION;
}


// ════════════════════════════════════════════════════════════
//  CONSTANTES
// ════════════════════════════════════════════════════════════
let CATEGORIES = {
  "Alimentación":   { color:"#F59E0B", icon:"🍽️" },
  "Transporte":     { color:"#3B82F6", icon:"🚗" },
  "Entretenimiento":{ color:"#8B5CF6", icon:"🎬" },
  "Salud":          { color:"#10B981", icon:"💊" },
  "Ropa":           { color:"#EC4899", icon:"👗" },
  "Hogar":          { color:"#F97316", icon:"🏠" },
  "Tecnología":     { color:"#06B6D4", icon:"💻" },
  "Servicios":      { color:"#6366F1", icon:"📱" },
  "Educación":      { color:"#84CC16", icon:"📚" },
  "Otros":          { color:"#94A3B8", icon:"📦" },
};

const MONTHS      = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const MONTHS_FULL = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DIAS_FULL   = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const CUR_MONTH = new Date().getMonth();
const CUR_YEAR  = new Date().getFullYear();

// Calcula mes/año real a partir de S.month (puede ser >11 si cruza año)
function viewMonthYear() {
  const abs = CUR_MONTH + (S.monthOffset || 0);
  return { mon: abs % 12, year: CUR_YEAR + Math.floor(abs / 12) };
}

const FREQS = {
  diaria:        { label:"Diaria",         icon:"📅", mult:30,   color:"#06B6D4", days:1  },
  semanal:       { label:"Semanal",        icon:"🗓️", mult:4.33, color:"#8B5CF6", days:7  },
  quincenal:     { label:"Quincenal",      icon:"📆", mult:2,    color:"#F59E0B", days:15 },
  mensual:       { label:"Mensual",        icon:"🗃️", mult:1,    color:"#10B981", days:30 },
  unica:         { label:"Única vez",      icon:"1️⃣", mult:1,    color:"#f472b6", days:null },
  anual:         { label:"Anual",          icon:"📅", mult:0.083, color:"#0ea5e9", days:365 },
  personalizada: { label:"Personalizada",  icon:"⚙️", mult:null, color:"#f472b6", days:null },
};

const BANKS = [
  { id:"banorte",   label:"Banorte",     color:"#ef4444", icon:"🔴" },
  { id:"bbva",      label:"BBVA",        color:"#3b82f6", icon:"🔵" },
  { id:"santander", label:"Santander",   color:"#f97316", icon:"🟠" },
  { id:"banamex",   label:"CitiBanamex", color:"#8b5cf6", icon:"🟣" },
  { id:"hsbc",      label:"HSBC",        color:"#ef4444", icon:"🔶" },
  { id:"otros",     label:"Otros",       color:"#94a3b8", icon:"⚪" },
];

const USER_COLORS = ["#f5a623","#22d3ee","#a78bfa","#34d399","#f472b6"];

function sentenceCase(val) {
  return val.replace(/(\S+)/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
}
function onSentenceCase(el) {
  const pos = el.selectionStart;
  el.value = el.value.replace(/(\S+)/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
  el.setSelectionRange(pos, pos);
}

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════
let S = {
  user:        "",
  userColor:   "#f5a623",
  tab:         "overview",
  month:       CUR_MONTH,
  monthOffset: 0,
  cfWinStart:  0,
  cfExpanded:  false,
  hiddenWeeks: [],   // índices de semanas ocultas en la ventana actual
  incomes:     [],
  expenses:    [],
  statements:  [],
  pendingTxs:  null,
  pendingMessages: null,
  bank:        "banorte",
  processing:  false,
  editModal:   null,
  editingId:   null,
  editingType: null,
  jointData:   null,
  aiError:     null,
  aiRawResponse: null,
  expFilter:   "todos",
  expView:     "lista",
  usdRate:     null,
  metaAhorro:  null,        // { monto, label }
  alertas:     [],          // [{ id, nombre, limite, categoria }]
};

// ════════════════════════════════════════════════════════════
//  ARRANQUE (sin login ni selector de usuario)
// ════════════════════════════════════════════════════════════
function getInitials(name) {
  const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
  if (!parts.length) return "—";
  return parts.map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

async function startApp() {
  applyAppVersion();
  S.user = APP_USER_ID;
  S.userColor = USER_COLORS[0];
  renderMonthBar();
  renderNav();
  renderAll();
  await loadData();
}

// ════════════════════════════════════════════════════════════
//  API
// ════════════════════════════════════════════════════════════
async function api(action, payload = {}) {
  try {
    const res = await fetch(WEBHOOK, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ action, user: S.user, ...payload }),
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const text = await res.text();
    try {
      return JSON.parse(text);
    } catch (parseErr) {
      console.error("API: respuesta no JSON (primeros 240 chars):", text.slice(0, 240));
      return {
        error:
          "El script no devolvió JSON (suele ser HTML de login o error). En Apps Script: Implementar > Nueva implementación > Ejecutar como: Yo · Quién tiene acceso: Cualquier usuario. Luego pega la URL /exec en WEBHOOK.",
      };
    }
  } catch (e) {
    console.error("API error:", e);
    showToast("Error de conexión — " + (e.message || "revisa red o CORS/file://"), "error");
    return null;
  }
}

// ── Persistencia local de pagadoWeeks ─────────────────────
function savePagadoLocal() {
  try {
    const key = `pagadoWeeks_${S.user}`;
    const map = {};
    [...S.incomes, ...S.expenses].forEach(item => {
      if (item.pagadoWeeks && item.pagadoWeeks.length > 0)
        map[item.id] = item.pagadoWeeks;
    });
    localStorage.setItem(key, JSON.stringify(map));
  } catch(e) {}
}

function restorePagadoLocal(items) {
  try {
    const key = `pagadoWeeks_${S.user}`;
    const map = JSON.parse(localStorage.getItem(key) || '{}');
    items.forEach(item => {
      if (map[item.id]) item.pagadoWeeks = map[item.id];
      else if (!item.pagadoWeeks) item.pagadoWeeks = [];
    });
  } catch(e) {}
}

async function loadData() {
  showToast("Cargando datos...", "info");
  S.incomes    = [];
  S.expenses   = [];
  S.statements = [];
  const data = await api("load_all");
  if (data && !data.error) {
    S.incomes    = (data.incomes    || []).filter(i => i.name);
    S.expenses   = (data.expenses   || []).filter(e => e.name);
    S.statements = data.statements  || [];
    restorePagadoLocal(S.incomes);
    restorePagadoLocal(S.expenses);
    // Cargar categorías: primero localStorage, luego servidor si tiene
    loadCategoriesLocal();
    if (data.categories && typeof data.categories === 'object' && Object.keys(data.categories).length > 0) {
      CATEGORIES = data.categories;
      try { localStorage.setItem('categories_' + S.user, JSON.stringify(CATEGORIES)); } catch(e) {}
    }
    showToast("✅ Datos cargados", "success");
    renderAll();
  } else {
    const detail =
      data && data.error
        ? data.error
        : "Sin respuesta. Si abres este HTML como archivo local (file://), el navegador suele bloquear el fetch: súbelo a Drive y ábrelo por enlace, o usa un servidor local. Comprueba también la URL /exec y el despliegue «Cualquier usuario».";
    showToast("⚠️ " + detail, "info");
  }
}

async function loadJointData() {
  const data = await api("load_joint");
  if (data) { S.jointData = data; renderJoint(); }
}

// ════════════════════════════════════════════════════════════
//  HELPERS
// ════════════════════════════════════════════════════════════
function toMonthly(amount, freq, diasCustom) {
  if (freq === 'unica') return Number(amount);  // ingreso único: se cuenta tal cual
  if (freq === 'personalizada' && diasCustom > 0) return Number(amount) * (30 / diasCustom);
  return Number(amount) * (FREQS[freq]?.mult || 1);
}

// Calcula los días de pago dentro del mes dado diaInicio y frecuencia
function calcPayDays(diaInicio, freq, diasCustom, daysInMonth) {
  const d0 = Math.max(1, Math.min(Number(diaInicio) || 1, daysInMonth));
  const days = [];
  switch (freq) {
    case 'diaria':
      for (let d = d0; d <= daysInMonth; d++) days.push(d);
      break;
    case 'semanal':
      for (let d = d0; d <= daysInMonth; d += 7) days.push(d);
      break;
    case 'quincenal':
      for (let d = d0; d <= daysInMonth; d += 15) days.push(d);
      break;
    case 'unica':
      days.push(Math.min(d0, daysInMonth));
      break;
    case 'anual':
      days.push(Math.min(d0, daysInMonth));
      break;
    case 'mensual':
      days.push(Math.min(d0, daysInMonth));
      break;
    case 'personalizada':
      const step = Math.max(1, Number(diasCustom) || 30);
      for (let d = d0; d <= daysInMonth; d += step) days.push(d);
      break;
    default:
      days.push(d0);
  }
  return days;
}

// Próximo día de pago (relativo al día de hoy, considerando el mes que se está viendo)
function nextPayDay(diaInicio, freq, diasCustom) {
  const { mon, year } = viewMonthYear();
  const dim   = new Date(year, mon + 1, 0).getDate();
  const pays  = calcPayDays(diaInicio, freq, diasCustom, dim);
  const mName = MONTHS[mon];

  // Si estamos viendo un mes futuro → todos los días son futuros
  const now       = new Date();
  const todayMon  = now.getMonth();
  const todayYr   = now.getFullYear();
  const todayDay  = now.getDate();
  const viewingFuture = year > todayYr || (year === todayYr && mon > todayMon);
  const viewingPast   = year < todayYr || (year === todayYr && mon < todayMon);

  if (viewingFuture) {
    // Mes futuro: mostrar primer día de pago del mes
    const first = pays[0] || 1;
    return { day: first, label: `Día ${first} ${mName.slice(0,3)}`, color: '#22d3ee' };
  }
  if (viewingPast) {
    // Mes pasado: mostrar último día de pago
    const last = pays[pays.length - 1] || 1;
    return { day: last, label: `Día ${last} ${mName.slice(0,3)}`, color: '#94a3b8' };
  }

  // Mes actual: comparar con hoy
  const next = pays.find(d => d >= todayDay) || pays[pays.length - 1];
  const diff = next - todayDay;
  if (diff === 0)  return { day: next, label: 'Hoy',      color: '#f5a623' };
  if (diff === 1)  return { day: next, label: 'Mañana',   color: '#f5a623' };
  if (diff < 0)    return { day: next, label: `Día ${next} ${mName.slice(0,3)}`, color: '#94a3b8' };
  return { day: next, label: `En ${diff} días`, color: '#22d3ee' };
}

function onFreqChange(pre) {
  const freq  = document.getElementById(pre + 'eFreq')?.value;
  const wrap  = document.getElementById(pre + 'customDaysWrap');
  const input = document.getElementById(pre + 'eCustomDays');
  const label = document.getElementById(pre + 'eDayLabel');
  const show  = freq === 'personalizada';
  if (wrap)  wrap.style.display = show ? 'grid' : 'none';
  if (input) input.tabIndex   = show ? 0 : -1;
  // Personalizada → forzar recurrente
  if (show) {
    const recCb = document.getElementById(pre + 'eRecurrente');
    if (recCb) { recCb.checked = true; recCb.disabled = true; }
  } else {
    const recCb = document.getElementById(pre + 'eRecurrente');
    if (recCb) recCb.disabled = false;
  }
  // Update label and button display text based on freq
  if (label) {
    label.textContent = freq === 'semanal'    ? 'Semana(s)' :
                        freq === 'quincenal'  ? 'Quincena'  :
                        freq === 'mensual'    ? 'Día del mes' :
                        freq === 'diaria'     ? '—' : 'Día de pago';
  }
  // Reset day display
  const display = document.getElementById(pre + 'eDayDisplay');
  const hidden  = document.getElementById(pre + 'eDay');
  if (display && hidden) {
    const defaultVal = freq === 'quincenal' ? '1,15' : '1';

    display.value = freq === 'semanal'   ? 'Lun'   :

}

async function fetchUSD() {
  const el = document.getElementById("usdBadge");
  // Intentar múltiples fuentes por si una falla (CORS, rate limit, etc.)
  const sources = [
    async () => {
      const r = await fetch("https://open.er-api.com/v6/latest/USD");
      const d = await r.json();
      return d?.rates?.MXN ? Number(d.rates.MXN).toFixed(2) : null;
    },
    async () => {
      const r = await fetch("https://api.exchangerate-api.com/v4/latest/USD");
      const d = await r.json();
      return d?.rates?.MXN ? Number(d.rates.MXN).toFixed(2) : null;
    },
    async () => {
      const r = await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.json");
      const d = await r.json();
      return d?.usd?.mxn ? Number(d.usd.mxn).toFixed(2) : null;
    },
  ];
  for (const src of sources) {
    try {
      const rate = await src();
      if (rate) { S.usdRate = rate; break; }
    } catch {}
  }
  if (el) {
    if (S.usdRate) {
      el.innerHTML = `<span style="color:var(--t3);font-size:10px;font-family:'JetBrains Mono',monospace">USD/MXN</span> <span style="color:var(--accent);font-weight:700;font-size:13px;font-family:'JetBrains Mono',monospace">$${S.usdRate}</span>`;
    } else {
      el.innerHTML = `<span style="color:var(--t3);font-size:10px;font-family:'JetBrains Mono',monospace">USD/MXN</span> <span style="color:var(--t3);font-size:11px;font-family:'JetBrains Mono',monospace;cursor:pointer" onclick="fetchUSD()" title="Reintentar">— ↺</span>`;
    }
  }
}

let _clockTimer = null;
function startClock() {
  if (_clockTimer) clearInterval(_clockTimer);
  const DIAS = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const MESES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  function tick() {
    const now = new Date();
    const dateEl = document.getElementById("clockDate");
    const timeEl = document.getElementById("clockTime");
    if (!dateEl || !timeEl) { clearInterval(_clockTimer); return; }
    const dia = DIAS[now.getDay()];
    const fecha = `${dia}, ${now.getDate()} ${MESES[now.getMonth()]} ${now.getFullYear()}`;
    let h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    const ampm = h >= 12 ? "p.m." : "a.m.";
    h = h % 12 || 12;
    const time = `${String(h).padStart(2,"0")}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")} ${ampm}`;
    dateEl.textContent = fecha;
    timeEl.textContent = time;
  }
  tick();
  _clockTimer = setInterval(tick, 1000);
}

function toggleUltimasTx() {
  const body = document.getElementById('ultimasTxBody');
  const btn  = document.getElementById('ultimasTxBtn');
  if (!body) return;
  const open = body.style.display !== 'none';
  body.style.display = open ? 'none' : 'block';
  if (btn) btn.textContent = open ? 'Ver ▼' : 'Ocultar ▲';
}

function toggleCatDetail(cat) {
  const el = document.getElementById(`catDetail-${cat}`);
  const arr = document.getElementById(`arr-${cat}`);
  if (!el) return;
  const open = el.style.display==="flex";
  el.style.display = open ? "none" : "flex";
  if (arr) arr.textContent = open ? "▼" : "▲";
}

async function takeScreenshot() {
  const el = document.getElementById("resumenCaptura");
  if (!el) return;
  showToast("📸 Capturando...","info");
  try {
    const dataUrl = await domtoimage.toPng(el, {
      bgcolor: "#060c16",
      width:  el.scrollWidth,
      height: el.scrollHeight,
      style: { transform: "scale(1)", transformOrigin: "top left" }
    });
    const link = document.createElement("a");
    link.download = `resumen-${S.user}-${MONTHS[S.month]}${CUR_YEAR}.png`;
    link.href = dataUrl;
    link.click();
    showToast("✅ Imagen guardada","success");
  } catch(e) { showToast("❌ Error: " + e.message,"error"); console.error(e); }
}

function renderExpenses() {

  const allExp=monthExpenses();
  const me = S.expFilter==="fijo"   ? allExp.filter(e=>e.type==="fijo")

  const tE=totalExpense(), tI=totalIncome(), bal=tI-tE;
  const tEFiltered=me.reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);

  const filterBtns=[
    {k:"todos",   label:"Todos"},
    {k:"fijo",    label:"🔒 Fijos"},
    {k:"variable",label:"🔄 Variables"},
  ].map(b=>`<button onclick="setExpFilter('${b.k}')" style="padding:5px 13px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid ${S.expFilter===b.k?'var(--accent)':'var(--border)'};background:${S.expFilter===b.k?'var(--accent)22':'var(--bg-input)'};color:${S.expFilter===b.k?'var(--accent)':'var(--t2)'};">${b.label}</button>`).join("");

  // Group by category

    const tA=a[1].reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);
    const tB=b[1].reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);
    return tB-tA;
  });

  function buildExpCol(items, tipo, color) {
    if (!items.length) return `<div style="color:var(--t3);text-align:center;padding:24px;font-size:13px;border:1px dashed var(--border);border-radius:10px">Sin gastos ${tipo} este mes</div>`;
    const groups={};
    items.forEach(e=>{ const c=e.category||"Otros"; if(!groups[c])groups[c]=[]; groups[c].push(e); });
    const sorted=Object.entries(groups).sort((a,b)=>{
      const tA=a[1].reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);
      const tB=b[1].reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);
      return tB-tA;
    });
    return sorted.map(([cat,citems])=>{
      const cm=catMeta(cat); const catTot=citems.reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);

        if (S.editingId===e.id && S.editingType==="expense") return inlineEditFormExp(e);

        const dia=e.diaInicio||1; const npd=nextPayDay(dia,e.frecuencia||"mensual",e.diasCustom);
        const freqLabel=e.frecuencia==="personalizada"&&e.diasCustom?`c/${e.diasCustom}d`:fr.label;
        const isRec = e.recurrente !== false;
        // Formato del badge Día: si tiene fechaUnica mostrar "D Mes YYYY"
        const diaBadgeLabel = (() => {
          if (e.fechaUnica && e.fechaUnica.includes('-')) {
            const p=e.fechaUnica.split('-');
            const mn=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
            return `${parseInt(p[2])} ${mn[parseInt(p[1])-1]}`;
          }
          return `Día ${dia}`;
        })();
        const recBadge = `<span onclick="toggleRecurrente('${e.id}')" title="Clic para cambiar" 
          style="cursor:pointer;padding:1px 5px;border-radius:99px;font-size:9px;font-family:'JetBrains Mono',monospace;white-space:nowrap;
          background:${isRec?'#22c55e18':'#f472b622'};color:${isRec?'#22c55e':'#f472b6'};
          border:1px solid ${isRec?'#22c55e44':'#f472b666'};user-select:none;transition:all .2s"
          onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'">
          ${isRec?'♾ Rec':'1× Único'}
        </span>`;
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:${idx%2===0?'var(--bg-card)':'#0d1829'};${idx>0?'border-top:1px solid var(--border)':''}">
          <div>
            <div style="font-size:12px;font-weight:500">${e.name}</div>
            <div class="flex ai g4" style="margin-top:3px;flex-wrap:nowrap;overflow:hidden">
              <span class="badge" style="background:${fr.color}18;color:${fr.color};border:1px solid ${fr.color}44;padding:1px 5px;font-size:9px;white-space:nowrap">${fr.icon} ${freqLabel}</span>
              <span class="badge" style="background:#22d3ee14;color:#22d3ee;border:1px solid #22d3ee33;padding:1px 5px;font-size:9px;white-space:nowrap">📅 ${diaBadgeLabel}</span>
              ${e.frecuencia==='personalizada' && e.fechaUnica && e.diasCustom ? (() => {

                let next = new Date(start);
                while(next < now) next.setDate(next.getDate() + e.diasCustom);
                const mn=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
                const diff = Math.round((next - now)/(86400000));
                const lbl = diff===0?'Hoy':diff===1?'Mañ':`${next.getDate()} ${mn[next.getMonth()]}`;
                return `<span class="badge" style="background:#f59e0b14;color:#f59e0b;border:1px solid #f59e0b33;padding:1px 5px;font-size:9px;white-space:nowrap">⏰ ${lbl}</span>`;
              })() : !e.fechaUnica ? `<span class="badge" style="background:${npd.color}14;color:${npd.color};border:1px solid ${npd.color}33;padding:1px 5px;font-size:9px;white-space:nowrap">⏰ ${npd.label}</span>` : ''}

  const allFixed  = allExp.filter(e=>e.type==="fijo" && e.recurrente!==false);

// ════════════════════════════════════════════════════════════
//  CASH FLOW
// ════════════════════════════════════════════════════════════
function renderCashFlow() {
  const el = document.getElementById("panel-expenses");
  const WIN = 7; // columnas de semana visibles

  // ── Construir línea de tiempo: viernes de mes actual + 3 meses futuros ──
  // allFridays[i] = { absMonth, mon, year, day, label, short }
  const allFridays = [];
  for (let off = 0; off <= 35; off++) {
    const abs = CUR_MONTH + off;
    const mon = abs % 12, year = CUR_YEAR + Math.floor(abs / 12);
    const dim = new Date(year, mon + 1, 0).getDate();
    for (let d = 1; d <= dim; d++) {
      if (new Date(year, mon, d).getDay() === 5) {
        // Rango: sábado anterior (d-6) al viernes (d)
        const satDate = new Date(year, mon, d - 6);
        const satDay = satDate.getDate();
        const satMon = satDate.getMonth();
        const rangeLabel = satMon === mon
          ? `${satDay} al ${d} ${MONTHS[mon]}`
          : `${satDay} ${MONTHS[satMon]} al ${d} ${MONTHS[mon]}`;
        allFridays.push({ off, mon, year, day: d, dim,
          short: `${DIAS_FULL[5]} ${d} de ${MONTHS_FULL[mon]}`,
          range: rangeLabel,
          label: `${d} ${MONTHS[mon]}` });
      }
    }
  }

  // Índice de inicio de cada mes en allFridays
  const monthStarts = Array.from({length:36},(_,i)=>i).map(off =>
    allFridays.findIndex(f => f.off === off)
  ).filter(i => i >= 0);

  // Ventana actual (6 columnas)
  const totalF = allFridays.length;
  // Primero calcular hiddenWeeks para saber cuáles están ocultas
  if (!S.hiddenWeeks) S.hiddenWeeks = [];
  if (!S.shownWeeks) S.shownWeeks = [];
  const todayAuto = new Date(); todayAuto.setHours(0,0,0,0);
  allFridays.forEach(function(w, absIdx) {
    var friDate = new Date(w.year, w.mon, w.day);
    if (friDate < todayAuto && !S.hiddenWeeks.includes(absIdx) && !S.shownWeeks.includes(absIdx)) {
      S.hiddenWeeks.push(absIdx);
    }
  });
  const hiddenSet = new Set(S.hiddenWeeks);

  // Calcular winStart y expandir la ventana hasta tener WIN semanas VISIBLES
  const rawStart = Math.max(0, Math.min(S.cfWinStart || 0, totalF - WIN));
  // Buscar cuántas semanas tomar desde rawStart para tener WIN visibles
  let winStart = rawStart;
  let winEnd = rawStart;
  let visCount = 0;
  while (winEnd < totalF && visCount < WIN) {
    if (!hiddenSet.has(winEnd)) visCount++;
    winEnd++;
  }
  // Si no llegamos a WIN visibles, no pasa nada — tomamos hasta donde hay
  const allWeeks = allFridays.slice(winStart, winEnd);
  S.cfWinStart = winStart;

  const isWeekHidden = i => hiddenSet.has(winStart + i);

  // Para cálculos usamos TODAS las semanas
  const weeks = allWeeks;
  const nW    = weeks.length;
  // Para render solo mostramos las visibles
  const visibleIdxs = allWeeks.map((_,i) => i).filter(i => !isWeekHidden(i));

  // Para cada columna: (mon/year/dim pueden variar)
  // Cada viernes cubre el rango desde el sábado anterior hasta ese viernes
  function dayToColIdx(mon, year, day) {
    const payDate = new Date(year, mon, day).getTime();
    // Buscar el viernes cuyo rango (sábado previo → viernes) contiene la fecha del pago
    let best = -1;
    for (let i = 0; i < nW; i++) {
      const w = weeks[i];
      const friDate = new Date(w.year, w.mon, w.day);
      const friEnd  = friDate.getTime() + 86399000; // fin del viernes
      // Inicio del rango: sábado anterior (día después del viernes previo)
      let rangeStart;
      if (i > 0) {
        const prev = weeks[i-1];
        rangeStart = new Date(prev.year, prev.mon, prev.day + 1).getTime();
      } else if (winStart > 0) {
        const prev = allFridays[winStart - 1];
        rangeStart = new Date(prev.year, prev.mon, prev.day + 1).getTime();
      } else {
        rangeStart = new Date(w.year, w.mon, w.day - 6).getTime(); // ~sábado
      }
      if (payDate >= rangeStart && payDate <= friEnd) { best = i; break; }
    }
    return best;
  }

  // ── Distribución multi-mes ────────────────────────────────
  // item: el objeto gasto/ingreso completo (necesitamos recurrente y month)
  function weekAmts(amount, freq, diasCustom, diaInicio, sign, item) {
    const a = new Array(nW).fill(0);
    const d = new Array(nW).fill(null).map(() => []);
    const rec = item ? item.recurrente !== false : true;

    // ── Fecha única exacta (fechaUnica = YYYY-MM-DD) ─────────
    // Solo aplica si NO es recurrente. Si es recurrente, la fecha es el punto de inicio.
    if (!rec && item?.fechaUnica && item.fechaUnica.includes('-')) {
      const p = item.fechaUnica.split('-');
      const y = parseInt(p[0]), m = parseInt(p[1])-1, day = parseInt(p[2]);
      const ci = dayToColIdx(m, y, day);
      if (ci >= 0) { a[ci] += sign * amount; d[ci].push({ day, mon: m }); }
      return { amounts: a, days: d };
    }

    // ── Recurrente con fechaUnica como fecha de INICIO ────────
    // Usar el día de fechaUnica como diaInicio, y el mes como punto de arranque
    if (rec && item?.fechaUnica && item.fechaUnica.includes('-')) {
      const p = item.fechaUnica.split('-');
      const startYear = parseInt(p[0]), startMon = parseInt(p[1])-1, startDay = parseInt(p[2]);
      const startAbsMonth = (startYear - CUR_YEAR) * 12 + startMon - CUR_MONTH;
      for (let off = Math.max(0, startAbsMonth); off <= 35; off++) {
        const abs  = CUR_MONTH + off;
        const mon  = abs % 12, year = CUR_YEAR + Math.floor(abs / 12);
        const dim  = new Date(year, mon + 1, 0).getDate();
        let payDays;
        if (freq === 'semanal') {
          payDays = [];
          for (let dd = 1; dd <= dim; dd++) {
            if (new Date(year, mon, dd).getDay() === 5) payDays.push(dd);
          }
        } else {
          payDays = calcPayDays(startDay, freq, diasCustom, dim);
        }
        payDays.forEach(day => {
          // Saltar el primer mes si el día es anterior al startDay
          if (off === startAbsMonth && day < startDay) return;
          const ci = dayToColIdx(mon, year, day);
          if (ci >= 0) { a[ci] += sign * amount; d[ci].push({ day, mon }); }
        });
      }
      return { amounts: a, days: d };
    }

    if (freq === 'personalizada' && diasCustom > 0) {
      // ── Ciclo absoluto: primer pago = mes creación + diaInicio ──────────
      // Anchor: mes del item (o mes actual si no tiene)
      const anchorMon  = item ? (item.month ?? CUR_MONTH) : CUR_MONTH;
      const anchorAbs  = CUR_MONTH; // base siempre mes actual para índice
      const anchorYear = CUR_YEAR;
      // Convertir diaInicio+anchorMon a Date absoluta
      const anchorDate = new Date(anchorYear, anchorMon, diaInicio || 1);
      const step = Math.max(1, Number(diasCustom));
      // Generar hasta 100 ocurrencias hacia adelante
      let cur = new Date(anchorDate);
      const cutoff = new Date(CUR_YEAR, CUR_MONTH + (rec ? 36 : 1), 1);
      for (let i = 0; i < 1000 && cur < cutoff; i++) {
        const m = cur.getMonth(), y = cur.getFullYear(), day = cur.getDate();
        const ci = dayToColIdx(m, y, day);
        if (ci >= 0) { a[ci] += sign * amount; d[ci].push({ day, mon: m }); }
        cur = new Date(cur.getTime() + step * 86400000);
      }
    } else {
      // ── Frecuencias estándar (diaria/semanal/quincenal/mensual) ───────────
      const maxOff = rec ? 35 : 0; // sin recurrente: solo mes de creación
      const startOff = item ? Math.max(0, (item.month ?? CUR_MONTH) - CUR_MONTH) : 0;
      for (let off = startOff; off <= maxOff; off++) {
        const abs  = CUR_MONTH + off;
        const mon  = abs % 12, year = CUR_YEAR + Math.floor(abs / 12);
        const dim  = new Date(year, mon + 1, 0).getDate();
        // Para anual: pago una vez al año en el mes de creación
        if (freq === 'anual') {
          const anchorMon = item ? (item.month ?? CUR_MONTH) : CUR_MONTH;
          if (mon % 12 === anchorMon % 12) {
            const day = Math.min(diaInicio || 1, dim);
            const ci = dayToColIdx(mon, year, day);
            if (ci >= 0) { a[ci] += sign * amount; d[ci].push({ day, mon }); }
          }
          continue;
        }
        let payDays;
        if (freq === 'semanal') {
          // Calcular viernes reales del mes (day of week = 5)
          payDays = [];
          for (let d = 1; d <= dim; d++) {
            if (new Date(year, mon, d).getDay() === 5) payDays.push(d);
          }
        } else {
          payDays = calcPayDays(diaInicio || 1, freq, diasCustom, dim);
        }
        payDays.forEach(day => {
          const ci = dayToColIdx(mon, year, day);
          if (ci >= 0) { a[ci] += sign * amount; d[ci].push({ day, mon }); }
        });
      }
    }
    return { amounts: a, days: d };
  }

  // ── Filas de datos ────────────────────────────────────────
  const incomes = S.incomes;
  // En flujo usamos TODOS los gastos (no solo el mes actual) para poder proyectar recurrentes
  const allExp    = S.expenses;
  const fixedExp  = allExp.filter(e => e.type === 'fijo');
  const varExp    = allExp.filter(e => e.type === 'variable');
  const totalVar  = varExp.reduce((s, e) => s + toMonthly(e.amount, e.frecuencia || 'mensual'), 0);

  const rows = [];

  // Ingresos
  incomes.forEach(inc => {
    const { amounts, days } = weekAmts(inc.amount, inc.frecuencia || 'mensual', inc.diasCustom, inc.diaInicio || 1, 1, inc);
    rows.push({ id: inc.id, label: inc.name, type: 'income', amounts, days, recurrente: inc.recurrente !== false, pagadoWeeks: inc.pagadoWeeks || [] });
  });

  // Separador
  if (incomes.length && fixedExp.length) rows.push({ type: 'sep' });

  // Gastos fijos
  fixedExp.forEach(exp => {
    const { amounts, days } = weekAmts(exp.amount, exp.frecuencia || 'mensual', exp.diasCustom, exp.diaInicio || 1, -1, exp);
    rows.push({ id: exp.id, label: exp.name, type: 'fixed', amounts, days, recurrente: exp.recurrente !== false, pagadoWeeks: exp.pagadoWeeks || [] });
  });

  // Gastos variables — uno por uno con su nombre real
  varExp.forEach(exp => {
    const { amounts, days } = weekAmts(exp.amount, exp.frecuencia || 'mensual', exp.diasCustom, exp.diaInicio || 1, -1, exp);
    rows.push({ id: exp.id, label: exp.name, type: 'variable', amounts, days, recurrente: exp.recurrente !== false, pagadoWeeks: exp.pagadoWeeks || [] });
  });

  // ── Totales por semana ────────────────────────────────────
  const weekIn  = new Array(nW).fill(0);
  const weekOut = new Array(nW).fill(0);
  rows.filter(r => r.amounts).forEach(r => {
    const pagadoSet = new Set(r.pagadoWeeks || []);
    r.amounts.forEach((a, i) => {
      if (a > 0) {
        // Ingresos: siempre cuentan (check es solo visual)
        weekIn[i] += a;
      } else if (a < 0) {
        // Gastos: solo cuentan si NO están marcados (no pagados/confirmados)
        const absIdx = winStart + i;
        if (!pagadoSet.has(absIdx)) {
          weekOut[i] -= a; // store as positive
        }
      }
    });
  });

  // ── Saldo semanal (no acumulativo) ───────────────────────
  const running = [];
  for (let i = 0; i < nW; i++) {
    running.push(weekIn[i] - weekOut[i]);
  }
  const minBal = Math.min(...running, 0);
  const maxBal = Math.max(...running, 0);

  // ── Totales globales ──────────────────────────────────────
  const totalInc  = weekIn.reduce((s, v) => s + v, 0);
  const totalOutA = weekOut.reduce((s, v) => s + v, 0);
  const finalBal  = totalInc - totalOutA;

  // ── KPIs compactos ────────────────────────────────────────
  const covPct = totalOutA > 0 ? ((totalInc/totalOutA)*100).toFixed(0) : '—';
  const covColor = covPct === '—' ? '#94a3b8' : totalInc >= totalOutA ? '#f59e0b' : '#ef4444';
  const kpis = `
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px">
      ${[
        { label:'💚 Ingresos',   value:`+$${fmtMXN(totalInc)}`,                               color:'#22c55e' },
        { label:'❤️ Egresos',   value:`-$${fmtMXN(totalOutA)}`,                               color:'#ef4444' },
        { label:'💰 Saldo final',value:`${finalBal>=0?'+':''}$${fmtMXN(finalBal)}`,            color: finalBal>=0?'#38bdf8':'#ef4444' },
        { label:'📊 Cobertura', value:`${covPct}${covPct!=='—'?'%':''}`,                       color: covColor },
      ].map(k=>`<div style="padding:12px 16px;border-radius:12px;background:var(--bg-card);border:1px solid ${k.color}44;display:flex;flex-direction:column;align-items:center;text-align:center">
        <div style="font-size:10px;color:var(--t3);margin-bottom:5px;letter-spacing:.03em">${k.label}</div>
        <div class="mono" style="font-size:18px;font-weight:700;color:${k.color}">${k.value}</div>
      </div>`).join('')}
    </div>`;

  // ── Gráfica de barras interactiva (HTML puro) ─────────────
  const barMax = Math.max(...weekIn, ...weekOut, 1);
  const chartId = 'cfChart_' + Date.now();
  const barsHtml = weeks.map((w, i) => {
    const inc = weekIn[i], out = weekOut[i], bal = running[i];
    const hInc = Math.round((inc / barMax) * 80);
    const hOut = Math.round((out / barMax) * 80);
    const balColor = bal >= 0 ? '#22c55e' : '#ef4444';
    return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 2px;border-radius:6px;transition:background .15s"
      onmouseover="this.style.background='#ffffff08'"
      onmouseout="this.style.background='transparent'"
      onclick="document.getElementById('cfTip').innerHTML='<b>${w.short}</b><br>+$${fmtMXN(inc)} ingresos<br>-$${fmtMXN(out)} egresos<br><span style=color:${balColor}>Saldo: $${fmtMXN(bal)}</span>'"
    >
      <div style="font-size:9px;color:${balColor};font-family:monospace;font-weight:700">${bal>=0?'+':''}$${fmtMXN(bal)}</div>
      <div style="width:100%;display:flex;align-items:flex-end;justify-content:center;gap:2px;height:84px">
        ${inc>0?`<div title="+$${fmtMXN(inc)}" style="flex:1;height:${Math.max(hInc,2)}px;background:#22c55e;border-radius:3px 3px 0 0;max-width:18px;transition:opacity .2s" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'"></div>`:'<div style="flex:1;max-width:18px"></div>'}
        ${out>0?`<div title="-$${fmtMXN(out)}" style="flex:1;height:${Math.max(hOut,2)}px;background:#ef4444;border-radius:3px 3px 0 0;max-width:18px;transition:opacity .2s" onmouseover="this.style.opacity='.7'" onmouseout="this.style.opacity='1'"></div>`:'<div style="flex:1;max-width:18px"></div>'}
      </div>
      <div style="font-size:9px;color:var(--t3);white-space:nowrap">${w.short}</div>
    </div>`;
  }).join('');

  const chartHtml = `
    <div class="card mb16" style="padding:14px 16px">
      <div class="flex jb ai" style="margin-bottom:10px">
        <div style="font-size:12px;font-weight:600;color:var(--t2)">📊 Flujo semanal</div>
        <div style="display:flex;gap:12px;font-size:10px;color:var(--t3)">
          <span><span style="display:inline-block;width:8px;height:8px;background:#22c55e;border-radius:2px;margin-right:3px"></span>Ingresos</span>
          <span><span style="display:inline-block;width:8px;height:8px;background:#ef4444;border-radius:2px;margin-right:3px"></span>Egresos</span>
        </div>
      </div>
      <div style="display:flex;gap:4px;align-items:flex-end">${barsHtml}</div>
      <div id="cfTip" style="margin-top:8px;min-height:18px;font-size:11px;color:var(--t2);text-align:center;padding:4px 8px;border-radius:6px;background:var(--bg);transition:all .2s">
        <span style="color:var(--t3);font-size:10px">↑ Haz clic en una barra para ver el detalle</span>
      </div>
    </div>`;

  // ── Tabla con concepto arriba del monto ───────────────────
  const thStyle = `padding:6px 8px;text-align:center;font-size:9px;color:#334155;font-weight:700;background:#e2e8f0;white-space:nowrap;border-bottom:2px solid #cbd5e1`;

  // Detectar cambios de mes entre semanas visibles
  const monthBorder = (i) => {
    if (i === 0) return '';
    const prev = weeks[visibleIdxs[visibleIdxs.indexOf(i) - 1]];
    const curr = weeks[i];
    return (prev && curr && (prev.mon !== curr.mon || prev.year !== curr.year))
      ? 'border-left:2px solid #1e293b;'
      : '';
  };

  // Fila de botones para ocultar semanas — solo columnas VISIBLES
  const hideRow = `<tr style="background:#f8fafc">
    <td style="padding:3px 8px;font-size:8px;color:#64748b;border-bottom:1px solid #cbd5e1;text-align:left;font-weight:600">👁 Columnas</td>
    ${visibleIdxs.map((wi) => {
      const absIdx = winStart + wi;
      return `<td style="padding:3px 4px;text-align:center;border-bottom:1px solid #cbd5e1;${monthBorder(wi)}">
        <button onclick="(function(){S.hiddenWeeks.push(${absIdx});renderExpenses()})()"
          title="Ocultar ${weeks[wi].short}"
          style="width:20px;height:20px;border-radius:4px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:12px;color:#94a3b8;font-weight:700;padding:0;line-height:1;transition:all .15s"
          onmouseover="this.style.borderColor='#ef4444';this.style.color='#ef4444'"
          onmouseout="this.style.borderColor='#cbd5e1';this.style.color='#94a3b8'">−</button>
      </td>`;
    }).join('')}
    <td style="border-bottom:1px solid #cbd5e1;background:#f1f5f9;font-size:9px;padding:2px 6px;text-align:center">
      ${S.hiddenWeeks.filter(x=>x>=winStart&&x<winStart+WIN).length > 0
        ? `<button onclick="(function(){S.hiddenWeeks.filter(x=>x>=${winStart}&&x<${winStart+WIN}).forEach(x=>{if(!S.shownWeeks.includes(x))S.shownWeeks.push(x)});S.hiddenWeeks=S.hiddenWeeks.filter(x=>x<${winStart}||x>=${winStart+WIN});renderExpenses()})()"
            style="font-size:9px;color:#16a34a;background:none;border:none;cursor:pointer;font-weight:600;white-space:nowrap">↺ Ver todas</button>`
        : ''}
    </td>
  </tr>`;

  const headers = `${hideRow}<tr>
    <th style="${thStyle};text-align:left;width:90px;max-width:90px;min-width:90px">Concepto</th>
    ${visibleIdxs.map(i => `<th style="${thStyle};${monthBorder(i)};padding:5px 8px;width:140px;min-width:140px;max-width:140px">${weeks[i].short}<br><span style="font-size:7px;font-weight:500;color:#64748b">${weeks[i].range}</span></th>`).join('')}
    <th style="${thStyle};width:80px;min-width:80px">Total mes</th>
  </tr>`;

  function rowHtml(r) {
    if (r.type === 'sep') return `<tr><td colspan="${visibleIdxs.length + 2}" style="height:1px;background:#e2e8f0;opacity:.6"></td></tr>`;

    const isInc  = r.type === 'income';
    const isVar  = r.type === 'variable';
    const pagadoSet = new Set(r.pagadoWeeks || []);

    // Verificar si TODAS las celdas visibles con valor están marcadas
    const visibleWithValue = visibleIdxs.filter(i => r.amounts[i] !== 0);
    const allChecked = visibleWithValue.length > 0 && visibleWithValue.every(i => pagadoSet.has(winStart + i));

    const rowBg    = allChecked ? '#d1d5db' : isInc ? '#f0fdf4' : 'white';
    const nameColor = allChecked ? '#6b7280' : isInc ? '#16a34a' : isVar ? '#d97706' : '#1e293b';
    const total    = r.amounts.reduce((s, a) => s + a, 0);
    const totalColor = allChecked ? '#6b7280' : total > 0 ? '#16a34a' : total < 0 ? '#dc2626' : '#64748b';

    const cells = visibleIdxs.map((wi) => {
      const a = r.amounts[wi];
      const absIdx = winStart + wi;
      const isCellPagado = pagadoSet.has(absIdx);
      const mBorder = monthBorder(wi);

      if (a === 0) return `<td style="padding:2px 6px;text-align:center;color:#94a3b8;font-size:10px;border-bottom:1px solid #e2e8f0;background:${allChecked?'#d1d5db':'#f8fafc'};${mBorder}">—</td>`;

      const rawColor = a > 0 ? '#16a34a' : '#dc2626';
      const color    = (isCellPagado || allChecked) ? '#6b7280' : rawColor;
      const sign     = a > 0 ? '+' : '';
      const payDaysHere = r.days ? r.days[wi] : [];
      const dayTxt = payDaysHere.length > 0
        ? payDaysHere.map(p=>`${p.day} ${MONTHS[p.mon]}`).join(', ')
        : '';

      const cellBg    = isCellPagado ? (isInc ? '#c4c9d4' : '#fde68a') : allChecked ? '#d1d5db' : (a > 0 ? '#dcfce7' : '#fee2e2');
      const cellBgHov = isCellPagado ? (isInc ? '#b0b7c3' : '#fcd34d') : allChecked ? '#c4c9d4' : (a > 0 ? '#bbf7d0' : '#fecaca');

      const chkHtml = r.id
        ? `<span onclick="event.stopPropagation();togglePagado('${r.id}',${absIdx})" style="display:inline-flex;align-items:center;cursor:pointer;flex-shrink:0"><input type="checkbox" ${isCellPagado?'checked':''} tabindex="-1" style="cursor:pointer;accent-color:${isInc?'#16a34a':'#ef4444'};width:13px;height:13px;pointer-events:none;"></span>`
        : '';

      return `<td style="padding:2px 5px;border-bottom:1px solid #e2e8f0;background:${cellBg};transition:background .15s;${mBorder}"
        onmouseover="this.style.background='${cellBgHov}'"
        onmouseout="this.style.background='${cellBg}'">
        <div onclick="editAmountInline(event,'${r.id}',${wi})" style="cursor:pointer;display:flex;align-items:center;gap:4px;opacity:${isCellPagado?'.6':'1'};overflow:hidden">
          ${chkHtml}
          <span style="font-size:9px;color:${color};white-space:nowrap">${r.label}</span>
          <span style="font-size:9px;font-family:monospace;color:${color};font-weight:700;white-space:nowrap;flex-shrink:0;${isCellPagado && !isInc ? 'text-decoration:line-through;opacity:.6' : ''}">${sign}$${fmtMXN(Math.abs(a))}</span>
          ${dayTxt ? `<span style="font-size:8px;color:${(isCellPagado||allChecked)?'#9ca3af':'#64748b'};white-space:nowrap;flex-shrink:0">${dayTxt}</span>` : ''}
        </div>
      </td>`;
    }).join('');

    return `<tr style="background:${rowBg}">
      <td style="padding:4px 8px;font-size:10px;color:${nameColor};font-weight:600;border-bottom:1px solid #e2e8f0;border-right:1px solid #e2e8f0">
        <div style="display:flex;align-items:center;gap:2px">
          <span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${r.label}</span>
          ${r.recurrente ? '<span title="Recurrente" style="font-size:8px;opacity:.5">♾️</span>' : '<span title="No recurrente" style="font-size:7px;color:#94a3b8">1×</span>'}
          ${r.id ? `<button onclick="openEditExpense('${r.id}')" title="Editar" style="background:none;border:none;cursor:pointer;font-size:9px;color:#94a3b8;padding:0px 2px;border-radius:3px;line-height:1;transition:color .15s" onmouseover="this.style.color='#f59e0b'" onmouseout="this.style.color='#94a3b8'">✏️</button>` : ''}
        </div>
      </td>
      ${cells}
      <td style="padding:4px 8px;text-align:center;font-size:10px;font-family:monospace;color:${totalColor};font-weight:700;border-bottom:1px solid #e2e8f0;border-left:2px solid #cbd5e1;background:${allChecked?'#c4c9d4':'#f1f5f9'}">
        ${allChecked ? '✓ ' : ''}${total > 0 ? '+' : ''}$${fmtMXN(Math.abs(total))}
      </td>
    </tr>`;
  }

  const inRow = `<tr style="background:#dcfce7;border-top:2px solid #86efac">
    <td style="padding:7px 12px;font-size:11px;font-weight:700;color:#16a34a;border-right:1px solid #e2e8f0">💚 Total Ingresos</td>
    ${visibleIdxs.map(i => `<td style="padding:7px 8px;text-align:center;font-size:11px;font-family:monospace;color:#16a34a;font-weight:700;border-bottom:1px solid #e2e8f0">${weekIn[i] > 0 ? '+$' + fmtMXN(weekIn[i]) : '—'}</td>`).join('')}
    <td style="padding:7px 10px;text-align:center;font-size:12px;font-family:monospace;color:#16a34a;font-weight:700;border-left:2px solid #86efac">+$${fmtMXN(totalInc)}</td>
  </tr>`;

  const outRow = `<tr style="background:#fee2e2;border-top:1px solid #fca5a5">
    <td style="padding:7px 12px;font-size:11px;font-weight:700;color:#dc2626;border-right:1px solid #e2e8f0">❤️ Total Egresos</td>
    ${visibleIdxs.map(i => `<td style="padding:7px 8px;text-align:center;font-size:11px;font-family:monospace;color:#dc2626;font-weight:700;border-bottom:1px solid #e2e8f0">${weekOut[i] > 0 ? '-$' + fmtMXN(weekOut[i]) : '—'}</td>`).join('')}
    <td style="padding:7px 10px;text-align:center;font-size:12px;font-family:monospace;color:#dc2626;font-weight:700;border-left:2px solid #fca5a5">-$${fmtMXN(totalOutA)}</td>
  </tr>`;

  const balRow = `<tr style="background:${finalBal >= 0 ? '#eff6ff' : '#fff1f2'};border-top:2px solid ${finalBal >= 0 ? '#93c5fd' : '#fca5a5'}">
    <td style="padding:8px 12px;font-size:12px;font-weight:800;color:#1d4ed8;border-right:1px solid #e2e8f0">💰 Saldo semana</td>
    ${visibleIdxs.map(i => {
      const c = running[i] >= 0 ? '#1d4ed8' : '#dc2626';
      return `<td style="padding:8px;text-align:center;font-size:12px;font-family:monospace;color:${c};font-weight:800;background:${running[i]>=0?'#dbeafe':'#fee2e2'}">${running[i] > 0 ? '+' : ''}$${fmtMXN(running[i])}</td>`;
    }).join('')}
    <td style="padding:8px 10px;text-align:center;font-size:14px;font-family:monospace;color:${finalBal>=0?'#1d4ed8':'#dc2626'};font-weight:800;border-left:2px solid #93c5fd">${finalBal > 0 ? '+' : ''}$${fmtMXN(finalBal)}</td>
  </tr>`;

  const cfExp = S.cfExpanded;

  // ── Filtrar filas sin valores en semanas visibles ─────────
  const visibleRows = rows.filter(r => {
    if (r.type === 'sep') return true; // separadores se filtran después
    if (!r.amounts) return false;
    // Verificar si tiene al menos un valor != 0 en las semanas visibles
    return visibleIdxs.some(wi => r.amounts[wi] !== 0);
  });

  // Eliminar separadores que queden al inicio, al final o duplicados
  const filteredRows = visibleRows.filter((r, idx, arr) => {
    if (r.type !== 'sep') return true;
    const prev = arr[idx - 1];
    const next = arr[idx + 1];
    if (!prev || !next) return false; // sep al inicio o al final
    if (prev.type === 'sep') return false; // sep consecutivos
    return true;
  });

  const tableBody = `${filteredRows.map(rowHtml).join('')}${inRow}${outRow}${balRow}`;

  const tableHtml = `
  <div id="cfTableWrap" style="border-radius:10px;border:1px solid #cbd5e1;overflow:visible;width:100%">
    <div style="overflow:visible">
      <table style="width:100%;border-collapse:collapse;background:#f8fafc;table-layout:fixed">
        <thead style="position:sticky;top:0;z-index:10;box-shadow:0 1px 0 #cbd5e1">${headers}</thead>
        <tbody>${tableBody}</tbody>
      </table>
    </div>
  </div>`;

  const viewToggle = `<div class="flex ai g8">
    ${[['lista','📋 Lista'],['flujo','📅 Flujo de caja']].map(([k,l])=>`
      <button onclick="S.expView='${k}';renderExpenses()" style="padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid ${S.expView===k?'var(--accent)':'var(--border)'};background:${S.expView===k?'var(--accent)22':'var(--bg-input)'};color:${S.expView===k?'var(--accent)':'var(--t2)'};">${l}</button>`).join('')}
  </div>`;

  const addForm = `<div class="card mb16">
    <div style="display:flex;gap:8px;align-items:end;overflow-x:auto;flex-wrap:nowrap;justify-content:center">
      ${expFormHTML('cf')}
    </div>
  </div>`;

  // ── Navegación de ventana ──────────────────────────────────
  const canLeft  = winStart > 0;
  const canRight = winStart + WIN < totalF;
  // Botones de mes: etiqueta del mes y su índice de inicio en allFridays
  // Botones de mes: fila simple con año centrado encima de cada grupo
  const monthBtns = (() => {
    // Agrupar por año
    const byYear = {};
    for (let off = 0; off < 36; off++) {
      const abs = CUR_MONTH + off;
      const m   = abs % 12;
      const yr  = CUR_YEAR + Math.floor(abs / 12);
      const isActive  = weeks.some(w => w.off === off);
      const startIdx  = allFridays.findIndex(f => f.off === off);
      if (startIdx < 0) continue;
      if (!byYear[yr]) byYear[yr] = [];
      byYear[yr].push({ m, off, startIdx, isActive });
    }
    // Max/min global de semanas visibles en la ventana actual
    const allVisCounts = Array.from({length:36}, (_,off) => weeks.filter(w => w.off === off).length).filter(c => c > 0);
    const globalMaxVis = allVisCounts.length ? Math.max(...allVisCounts) : 0;
    const globalMinVis = allVisCounts.length ? Math.min(...allVisCounts) : 0;

    if (!S.cfExpandedYears) S.cfExpandedYears = {};
    return Object.entries(byYear).map(([yr, months]) => {
      const yrNum = parseInt(yr);
      const isCurYear = yrNum === CUR_YEAR;
      // Por default solo el año actual está expandido
      const isExpanded = isCurYear
        ? (S.cfExpandedYears[yr] !== false)   // cur year: expanded unless explicitly closed
        : (S.cfExpandedYears[yr] === true);   // otros años: collapsed unless explicitly opened
      const btns = isExpanded ? months.map(({m, off, startIdx, isActive}) => {
        const visibleCount = weeks.filter(w => w.off === off).length;
        const friColor = visibleCount === 0        ? 'var(--t3)'
                       : visibleCount >= globalMaxVis ? '#22c55e'
                       : visibleCount <= globalMinVis ? '#f59e0b'
                       : 'var(--t3)';
        const activeBorder = isActive ? 'var(--accent)' : visibleCount > 0 ? friColor + '88' : 'var(--border)';
        const activeBg     = isActive ? 'var(--accent)22' : visibleCount > 0 ? friColor + '18' : 'var(--bg-input)';
        const activeColor  = visibleCount > 0 ? friColor : 'var(--t3)';
        return `<button onclick="S.cfWinStart=${startIdx};renderExpenses()"
          title="${MONTHS_FULL[m]} ${yr} · ${visibleCount} visible(s)"
          style="padding:4px 8px;border-radius:6px;font-size:10px;cursor:pointer;font-weight:600;
          border:1px solid ${activeBorder};background:${activeBg};color:${activeColor};">${MONTHS[m]}</button>`;
      }).join('') : '';
      const yearBtnColor = isCurYear ? 'var(--accent)' : 'var(--t3)';
      const yearBtnBg    = isCurYear ? 'var(--accent)18' : 'var(--bg-input)';
      return `<div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
        <button onclick="(function(){if(!S.cfExpandedYears)S.cfExpandedYears={};S.cfExpandedYears['${yr}']=!${isExpanded};renderExpenses()})()"
          style="font-size:9px;color:${yearBtnColor};font-weight:700;margin-bottom:3px;letter-spacing:.05em;background:${yearBtnBg};border:1px solid ${yearBtnColor}44;border-radius:5px;padding:1px 7px;cursor:pointer">
          ${isExpanded ? '▼' : '▶'} ${yr}
        </button>
        ${isExpanded ? `<div style="display:flex;gap:3px">${btns}</div>` : ''}
      </div>`;
    }).join(`<div style="width:1px;background:var(--border);height:32px;flex-shrink:0;margin:0 4px;align-self:flex-end"></div>`);
  })();

  const winNav = `<div style="display:flex;align-items:center;gap:4px;margin-bottom:10px;overflow-x:auto;padding-bottom:4px;flex-wrap:nowrap">
    <button onclick="S.cfWinStart=Math.max(0,${winStart}-1);renderExpenses()"
      style="padding:4px 10px;border-radius:6px;font-size:15px;cursor:pointer;border:1px solid var(--border);background:var(--bg-input);color:var(--t2);opacity:${canLeft?1:.3};pointer-events:${canLeft?'auto':'none'}">‹</button>
    ${monthBtns}
    <button onclick="S.cfWinStart=Math.min(${totalF-WIN},${winStart}+1);renderExpenses()"
      style="padding:4px 10px;border-radius:6px;font-size:15px;cursor:pointer;border:1px solid var(--border);background:var(--bg-input);color:var(--t2);opacity:${canRight?1:.3};pointer-events:${canRight?'auto':'none'}">›</button>
    <span style="font-size:10px;color:var(--t3);margin-left:4px">Mostrando semanas ${winStart+1}–${Math.min(winStart+WIN,totalF)} de ${totalF}</span>
  </div>`;

  el.innerHTML = `
    <div class="flex jb ai fw" style="margin-bottom:16px">
      <div class="section-title" style="color:${S.userColor};margin-bottom:0">💸 Gastos — ${S.user}</div>
      ${viewToggle}
    </div>
    ${kpis}
    ${chartHtml}
    <div style="font-size:12px;font-weight:600;color:var(--t2);margin-bottom:8px">📋 Flujo detallado por semana</div>
    ${winNav}
    ${tableHtml}
    ${fixedExp.length === 0 && incomes.length === 0 ? `<div class="card mt16" style="text-align:center;color:var(--t3);padding:32px;font-size:13px">Agrega ingresos y gastos fijos para ver el flujo de caja</div>` : ''}`;
}


function renderStatement() {
  const el = document.getElementById("panel-statement");
  if (S.pendingTxs && !S.processing) { renderPending(el); return; }

  const bBtns = BANKS.map(b=>`<button class="bank-btn" style="border-color:${S.bank===b.id?b.color:'var(--border-hi)'};background:${S.bank===b.id?b.color+'22':'var(--bg-input)'};color:${S.bank===b.id?b.color:'var(--t3)'}" onclick="S.bank='${b.id}';renderStatement()">${b.icon} ${b.label}</button>`).join("");

  const loading = S.processing ? `<div class="card mb16" style="border:1px solid #8b5cf655;background:#8b5cf608">
    <div style="text-align:center;padding:20px 10px">
      <div style="font-size:28px;margin-bottom:12px;animation:spin 2s linear infinite;display:inline-block">🤖</div>
      <div class="mono" style="font-size:13px;color:var(--purple);margin-bottom:16px">Extrayendo movimientos con Claude AI...</div>
      <div id="aiProgressBar" style="background:#1a2d44;border-radius:8px;height:10px;overflow:hidden;margin-bottom:8px">
        <div id="aiProgressFill" style="height:100%;width:0%;background:linear-gradient(90deg,#8b5cf6,#22d3ee);border-radius:8px;transition:width .4s ease;animation:progressAnim 2.5s ease-in-out infinite"></div>
      </div>
      <div id="aiProgressLabel" style="font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace">Leyendo documento...</div>
    </div>
  </div>` : S.aiError ? `<div class="card mb16" style="border:1px solid #ef444455;background:#ef444408">
    <div style="font-size:13px;font-weight:600;color:var(--red);margin-bottom:8px">⚠️ No se encontraron transacciones</div>
    <div style="font-size:11px;color:var(--t3);font-family:'JetBrains Mono',monospace;word-break:break-all;white-space:pre-wrap;max-height:120px;overflow-y:auto">${S.aiError}</div>
  </div>` : "";

  el.innerHTML = `
    <div class="section-title" style="color:${S.userColor};margin-bottom:20px">🏦 Estado de Cuenta — ${S.user}</div>
    <div class="card mb16" style="border:1px solid #8b5cf633">
      <div class="mb16">
        <div class="kpi-label mb8">Banco / Emisor</div>
        <div class="flex g8 fw">${bBtns}</div>
      </div>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fInput').click()">
        <div style="font-size:36px;margin-bottom:8px">📑</div>
        <div style="font-size:14px;color:var(--t2)">Arrastra tu estado de cuenta aquí</div>
        <div style="font-size:12px;color:var(--t3);margin-top:4px">PDF · JPG · PNG · TXT</div>
        <div style="font-size:11px;color:var(--accent);margin-top:6px">↑ Haz clic o arrastra el archivo</div>
        <input id="fInput" type="file" accept=".pdf,.txt,image/jpeg,image/png,image/webp" style="display:none" onchange="handleFileInput(this)">
      </div>
      ${S.processing
        ? `<button class="btn btn-purple w100" disabled style="margin-top:10px;padding:12px;opacity:.7">
             <span class="spinner" style="vertical-align:middle;margin-right:8px"></span>Analizando...
           </button>`
        : S.pendingMessages
          ? `<button class="btn btn-purple w100" onclick="analyzeText()" style="margin-top:10px;padding:12px;">
               ✨ Analizar con Claude AI
             </button>`
          : `<button class="btn w100" disabled style="margin-top:10px;padding:12px;opacity:.4;background:var(--bg-card);border:1px solid var(--border);color:var(--t3);cursor:not-allowed;">
               📂 Sube un archivo para continuar
             </button>`
      }
    </div>
    ${loading}`;

  if (S.processing) {
    const steps = [
      [0,   "Leyendo documento..."],
      [20,  "Identificando movimientos..."],
      [45,  "Clasificando categorías..."],
      [70,  "Asignando montos..."],
      [88,  "Finalizando análisis..."],
    ];
    let step = 0;
    const iv = setInterval(()=>{
      const fill = document.getElementById("aiProgressFill");
      const label = document.getElementById("aiProgressLabel");
      if (!fill) { clearInterval(iv); return; }
      if (step < steps.length) {
        fill.style.width = steps[step][0] + "%";
        if (label) label.textContent = steps[step][1];
        step++;
      }
    }, 900);
  }

  const dz = document.getElementById("dropZone");
  if (dz) {
    dz.ondragover = e=>{ e.preventDefault(); dz.classList.add("over"); };
    dz.ondragleave = ()=>dz.classList.remove("over");
    dz.ondrop = e=>{ e.preventDefault(); dz.classList.remove("over"); handleFile(e.dataTransfer.files[0]); };
  }
}

function renderPending(el) {
  const ptx=S.pendingTxs; const bk=bankInfo(ptx.bank); const total=ptx.txs.reduce((s,t)=>s+t.amount,0);
  const byCat={}; ptx.txs.forEach(t=>{ if(!byCat[t.category])byCat[t.category]={total:0,txs:[]}; byCat[t.category].total+=t.amount; byCat[t.category].txs.push(t); });
  const sorted=Object.entries(byCat).sort((a,b)=>b[1].total-a[1].total);

  const catRows=sorted.map(([cat,info])=>{
    const m=catMeta(cat); const pct=(info.total/total)*100;
    const txR=info.txs.map(t=>`<div class="flex jb mono" style="font-size:11px;color:var(--t3);padding:2px 0 2px 12px"><span>${t.name}</span><span>$${fmtMXN(t.amount,2)}</span></div>`).join("");
    return `<div class="mb12">
      <div class="flex jb ai mb8">
        <span style="font-size:12px">${m.icon} ${cat} <span style="color:var(--t3)">(${info.txs.length})</span></span>
        <span class="mono" style="font-size:12px;color:${m.color}">$${fmtMXN(info.total,2)}</span>
      </div>
      <div class="prog-track mb8"><div class="prog-fill" style="width:${pct}%;background:${m.color}"></div></div>
      ${txR}
    </div>`;
  }).join("");

  el.innerHTML = `
    <div class="section-title" style="color:${S.userColor}">🏦 Estado de Cuenta — ${S.user}</div>
    <div class="card mb16" style="border:1px solid ${bk.color}55;background:linear-gradient(135deg,var(--bg-card),#0f1f35)">
      <div class="flex jb ai fw g10">
        <div class="flex ai g10"><span style="font-size:28px">${bk.icon}</span><div><div class="serif" style="font-size:20px;font-weight:700;color:${bk.color}">${bk.label}</div><div class="mono" style="font-size:11px;color:var(--t3)">${ptx.txs.length} movimientos · ${MONTHS[S.month]} ${CUR_YEAR}</div></div></div>
        <div style="text-align:right"><div class="mono" style="font-size:10px;color:var(--t3)">Total</div><div class="serif" style="font-size:26px;font-weight:800;color:var(--accent)">$${fmtMXN(total,2)}</div></div>
      </div>
    </div>
    <div class="card mb16">
      <div class="section-title" style="font-size:16px">Por categoría</div>
      ${catRows}
      <div style="border-top:1px solid var(--border);padding-top:10px" class="flex jb"><span style="font-size:13px;font-weight:600">Total</span><span class="mono" style="color:var(--accent);font-weight:700">$${fmtMXN(total,2)}</span></div>
    </div>
    <div class="flex g10">
      <button class="btn btn-ghost" style="flex:1;padding:11px" onclick="cancelPending()">Cancelar</button>
      <button class="btn btn-acc" style="flex:1;padding:11px;font-weight:700;background:#3b82f6;color:#fff" onclick="confirmExport('single')">📦 1 gasto total<br><span style="font-size:10px;font-weight:400;opacity:.85">$${fmtMXN(ptx.txs.reduce((s,t)=>s+t.amount,0),2)}</span></button>
      <button class="btn btn-acc" style="flex:1;padding:11px;font-weight:700" onclick="confirmExport('individual')">📋 ${ptx.txs.length} gastos individuales</button>
    </div>`;
}

function renderJoint() {
  const el = document.getElementById("panel-joint");
  const jd = S.jointData;

  if (!jd) {
    el.innerHTML = `<div class="section-title">👥 Vista Conjunta</div><div class="card tc" style="padding:40px"><div class="spinner" style="width:32px;height:32px;border-width:3px;margin:0 auto"></div><div style="color:var(--t3);margin-top:12px;font-size:13px">Cargando datos...</div></div>`;
    return;
  }

  const users = jd.users || [];
  if (users.length === 0) {
    el.innerHTML = `<div class="section-title">👥 Vista Conjunta</div><div class="card tc" style="padding:40px"><div style="font-size:40px">👥</div><div style="color:var(--t3);margin-top:10px;font-size:13px">Aún no hay datos de otros usuarios</div></div>`;
    return;
  }

  // Combined totals
  let combInc=0, combExp=0;
  users.forEach(u=>{
    const d=jd.data[u]; if(!d) return;
    combInc += d.incomes.reduce((s,i)=>s+toMonthly(i.amount,i.frecuencia),0);
    combExp += d.expenses.filter(e=>e.month===S.month).reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);
  });
  const combBal=combInc-combExp;

  const userCols = users.map((u,idx)=>{
    const d=jd.data[u]; if(!d) return "";
    const col=USER_COLORS[idx%USER_COLORS.length];
    const uInc=d.incomes.reduce((s,i)=>s+toMonthly(i.amount,i.frecuencia),0);
    const uExp=d.expenses.filter(e=>e.month===S.month).reduce((s,e)=>s+toMonthly(e.amount,e.frecuencia||"mensual"),0);
    const uBal=uInc-uExp;

    // Category pie for this user
    const byCat={};
    d.expenses.filter(e=>e.month===S.month).forEach(e=>{ byCat[e.category]=(byCat[e.category]||0)+toMonthly(e.amount,e.frecuencia||"mensual"); });
    const topCats=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const catRows=topCats.map(([cat,val])=>{
      const m=catMeta(cat); const pct=uExp>0?(val/uExp)*100:0;
      return `<div style="margin-bottom:8px"><div class="flex jb" style="margin-bottom:3px"><span style="font-size:12px">${m.icon} ${cat}</span><span class="mono" style="font-size:11px;color:${m.color}">$${fmtMXN(val)}</span></div><div class="prog-track"><div class="prog-fill" style="width:${pct}%;background:${m.color}"></div></div></div>`;
    }).join("") || `<div style="color:var(--t3);font-size:12px">Sin gastos este mes</div>`;

    return `<div class="joint-col">
      <div class="flex ai g10 mb16">
        <div style="width:40px;height:40px;border-radius:50%;background:${col}22;color:${col};border:2px solid ${col}55;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:16px">${getInitials(u)}</div>
        <div class="serif" style="font-size:20px;font-weight:700;color:${col}">${u}</div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
        <div class="kpi-card" style="padding:14px;border-color:#22c55e33"><div class="kpi-label" style="font-size:9px">Ingresos</div><div class="mono" style="font-size:14px;color:var(--green);font-weight:600;margin-top:4px">+$${fmtMXN(uInc)}</div></div>
        <div class="kpi-card" style="padding:14px;border-color:#f5a62333"><div class="kpi-label" style="font-size:9px">Gastos</div><div class="mono" style="font-size:14px;color:var(--accent);font-weight:600;margin-top:4px">-$${fmtMXN(uExp)}</div></div>
        <div class="kpi-card" style="padding:14px;border-color:${uBal>=0?'#3b82f6':'#ef4444'}33"><div class="kpi-label" style="font-size:9px">Balance</div><div class="mono" style="font-size:14px;color:${uBal>=0?'var(--blue)':'var(--red)'};font-weight:600;margin-top:4px">$${fmtMXN(Math.abs(uBal))}</div></div>
      </div>
      <div class="card"><div style="font-size:13px;font-weight:600;color:var(--t2);margin-bottom:12px">Top gastos — ${MONTHS[S.month]}</div>${catRows}</div>
    </div>`;
  }).join(`<div class="joint-sep" style="margin:0 20px"></div>`);

  el.innerHTML = `
    <div class="section-title">👥 Vista Conjunta — ${MONTHS[S.month]} ${CUR_YEAR}</div>
    <div class="g3 mb16">
      <div class="kpi-card" style="border:1px solid #22c55e33"><div class="kpi-label">Ingresos combinados</div><div class="kpi-value" style="color:var(--green)">+$${fmtMXN(combInc)}</div></div>
      <div class="kpi-card" style="border:1px solid #f5a62333"><div class="kpi-label">Gastos combinados</div><div class="kpi-value" style="color:var(--accent)">-$${fmtMXN(combExp)}</div></div>
      <div class="kpi-card" style="border:1px solid ${combBal>=0?'#3b82f6':'#ef4444'}33"><div class="kpi-label">Balance total</div><div class="kpi-value" style="color:${combBal>=0?'var(--blue)':'var(--red)'}">$${fmtMXN(Math.abs(combBal))}</div></div>
    </div>
    <div class="flex fw" style="gap:0;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px">
      ${userCols}
    </div>`;
}
