async function addIncome() {
  let name=document.getElementById("iName")?.value?.trim();
  const amount=document.getElementById("iAmt")?.value;
  const frecuencia = document.getElementById("iFreq")?.value || "quincenal";
  const isUnica = frecuencia === 'unica';
  
  // Días automáticos según frecuencia
  let diaInicio, fechaUnica = null, recurrente = true;
  if (isUnica) {
    recurrente = false;
    const rawDay = document.getElementById("iDay")?.value || '1';
    diaInicio = rawDay.includes('-') ? parseInt(rawDay.split('-')[2]) : (Number(rawDay)||1);
    fechaUnica = rawDay.includes('-') ? rawDay : null;
  } else if (frecuencia === 'semanal') {
    diaInicio = 5; // viernes (día de la semana, calcPayDays maneja esto)
  } else if (frecuencia === 'quincenal') {
    diaInicio = 15; // 15 y 30
  } else {
    diaInicio = 30; // fin de mes
  }
  
  if (!name||!amount) { showToast("Completa nombre y monto","error"); return; }
  name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase().replace(/\s([a-záéíóúüñ])/g, m=>m.toUpperCase());
  const item={ id:uid(), name, amount:Number(amount), type:"fijo", frecuencia, diaInicio, fechaUnica, recurrente };
  S.incomes.push(item); renderAll(); showToast("✅ Ingreso agregado","success");
  await api("add_income",{ income:item });
  document.getElementById("iName").value=""; document.getElementById("iAmt").value="";
  setTimeout(()=>{ const f=document.getElementById("iName"); if(f) f.focus(); }, 80);
}

async function addExpense(pre = '') {
  let name=document.getElementById(pre+"eName")?.value?.trim();
  const amount=document.getElementById(pre+"eAmt")?.value;
  const type=document.getElementById(pre+"eType")?.value;
  let recurrente = document.getElementById(pre+"eRecurrente")?.checked === true;
  const frecuencia = recurrente ? (document.getElementById(pre+"eFreq")?.value || "mensual") : "mensual";
  // Personalizada siempre es recurrente
  if (frecuencia === 'personalizada') recurrente = true;
  const rawDay = document.getElementById(pre+"eDay")?.value || '1';
  const diaInicio = rawDay.includes('-') ? parseInt(rawDay.split('-')[2]) : (Number(rawDay)||1);
  // Guardar fecha completa siempre que se haya seleccionado un mes específico
  const fechaUnica = rawDay.includes('-') ? rawDay : null;
  const diasCustom = frecuencia==="personalizada" ? Number(document.getElementById(pre+"eCustomDays")?.value)||14 : null;
  const category   = document.getElementById(pre+"eCat")?.value || "Otros";
  if (!name||!amount) { showToast("Completa nombre y monto","error"); return; }
  if (frecuencia === 'personalizada' && !diasCustom) { showToast("Indica cada cuántos días","error"); return; }
  name = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase().replace(/\s([a-záéíóúüñ])/g, m=>m.toUpperCase());
  const item={ id:uid(), name, amount:Number(amount), type, frecuencia, diaInicio, fechaUnica, diasCustom, recurrente, category, month:S.month, pagado: false };
  S.expenses.push(item); renderAll(); showToast("✅ Gasto agregado","success");
  await api("add_expense",{ expense:item });
  document.getElementById(pre+"eName").value=""; document.getElementById(pre+"eAmt").value="";
  setTimeout(()=>{ const f=document.getElementById(pre+"eName"); if(f) f.focus(); }, 80);
}

async function toggleRecurrente(id) {
  const exp = S.expenses.find(e => e.id === id);
  if (!exp) return;
  const newVal = exp.recurrente === false ? true : false;
  exp.recurrente = newVal;
  renderAll();
  showToast(newVal ? '♾️ Ahora es recurrente' : '1× Solo una vez', 'info');
  await api("update_expense", { expense: exp });
}

async function togglePagado(id, absWeekIdx) {
  // Buscar en ingresos primero, luego en gastos
  const item = S.incomes.find(e => e.id === id) || S.expenses.find(e => e.id === id);
  if (!item) return;
  if (!item.pagadoWeeks) item.pagadoWeeks = [];
  const pos = item.pagadoWeeks.indexOf(absWeekIdx);
  if (pos >= 0) item.pagadoWeeks.splice(pos, 1);
  else item.pagadoWeeks.push(absWeekIdx);
  // Guardar inmediatamente en localStorage para persistencia garantizada
  savePagadoLocal();
  renderAll();
  const isNowPagado = item.pagadoWeeks.includes(absWeekIdx);
  showToast(isNowPagado ? '✅ Marcado como pagado' : '⏳ Desmarcado', 'info');
  const isIncome = S.incomes.some(e => e.id === id);
  if (isIncome) await api("update_income", { income: item });
  else await api("update_expense", { expense: item });
}

function editAmountInline(event, id, weekIndex) {
  event.stopPropagation();
  const exp = S.expenses.find(e => e.id === id);
  if (!exp) return;
  
  const td = event.currentTarget;
  const currentAmount = exp.amount;
  
  const input = document.createElement('input');
  input.type = 'number';
  input.value = currentAmount;
  input.style.cssText = `
    width: 60px;
    padding: 4px;
    font-size: 11px;
    border: 2px solid var(--accent);
    border-radius: 4px;
    background: var(--bg-input);
    color: var(--t1);
    font-family: monospace;
    font-weight: 700;
    text-align: center;
  `;
  
  td.innerHTML = '';
  td.appendChild(input);
  input.focus();
  input.select();
  
  function saveAmount() {
    const newAmount = parseFloat(input.value);
    if (isNaN(newAmount) || newAmount <= 0) {
      showToast('⚠️ Ingresa un monto válido', 'error');
      renderAll();
      return;
    }
    
    exp.amount = newAmount;
    renderAll();
    showToast('✅ Monto actualizado', 'success');
    api("update_expense", { expense: exp });
  }
  
  input.onblur = saveAmount;
  input.onkeydown = (e) => {
    if (e.key === 'Enter') saveAmount();
    if (e.key === 'Escape') renderAll();
  };
}

function handleFileInput(input) { if(input.files[0]) handleFile(input.files[0]); }

function fileToBase64(file) {
  return new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(",")[1]); r.onerror=rej; r.readAsDataURL(file); });
}

async function extractPDFText(file) {
  // Use PDF.js to extract text from PDF — avoids sending huge base64 via webhook
  if (!window.pdfjsLib) throw new Error("PDF.js no cargado");
  pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let text = "";
  for (let i = 1; i <= pdf.numPages; i++) {
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();
    text += content.items.map(s=>s.str).join(" ") + "\n";
  }
  return text.trim();
}

function setDropZoneStatus(msg, color="#7da0c0") {
  const dz = document.getElementById("dropZone");
  if (dz) dz.innerHTML = `<div style="font-size:22px;margin-bottom:8px">⏳</div><div style="font-size:13px;color:${color}">${msg}</div>`;
}

async function handleFile(file) {
  if (!file) return;
  const isPDF = file.type==="application/pdf" || file.name.toLowerCase().endsWith(".pdf");
  const isImg = /\.(jpe?g|png|webp|gif)$/i.test(file.name) || file.type.startsWith("image/");

  // Mostrar nombre del archivo en la drop zone
  const dz = document.getElementById("dropZone");
  if (dz) dz.innerHTML = `
    <div style="font-size:28px;margin-bottom:6px">📄</div>
    <div style="font-size:13px;font-weight:600;color:var(--accent)">${file.name}</div>
    <div style="font-size:11px;color:var(--t3);margin-top:3px">${(file.size/1024).toFixed(0)} KB — listo para analizar</div>
    <div style="font-size:11px;color:var(--t3);margin-top:6px;opacity:.6">Haz clic para cambiar archivo</div>
    <input id="fInput" type="file" accept=".pdf,.txt,image/jpeg,image/png,image/webp" style="display:none" onchange="handleFileInput(this)">`;

  S.pendingMessages = null;
  setDropZoneStatus("Preparando archivo...", "var(--purple)");

  try {
    let messages = null;

    if (isPDF) {
      try {
        const text = await extractPDFText(file);
        if (!text || text.length < 50) {
          // PDF escaneado — usar base64
          const base64 = await fileToBase64(file);
          messages = [
            { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } },
            { type:"text", text:promptExtract() }
          ];
        } else {
          messages = [{ type:"text", text: promptExtract() + "\n\n" + text.slice(0, 5000) }];
        }
      } catch(e) {
        const base64 = await fileToBase64(file);
        messages = [
          { type:"document", source:{ type:"base64", media_type:"application/pdf", data:base64 } },
          { type:"text", text:promptExtract() }
        ];
      }
    } else if (isImg) {
      const base64 = await fileToBase64(file);
      messages = [
        { type:"image", source:{ type:"base64", media_type:file.type||"image/jpeg", data:base64 } },
        { type:"text", text:promptExtract() }
      ];
    } else {
      const text = await file.text();
      messages = [{ type:"text", text:promptExtract()+"\n\n"+text.slice(0,8000) }];
    }

    S.pendingMessages = messages;

    // Actualizar drop zone — listo
    if (dz) dz.innerHTML = `
      <div style="font-size:28px;margin-bottom:6px">✅</div>
      <div style="font-size:13px;font-weight:600;color:var(--green)">${file.name}</div>
      <div style="font-size:11px;color:var(--t3);margin-top:3px">${(file.size/1024).toFixed(0)} KB — archivo listo</div>
      <div style="font-size:11px;color:var(--t3);margin-top:6px;opacity:.6">Haz clic para cambiar archivo</div>
      <input id="fInput" type="file" accept=".pdf,.txt,image/jpeg,image/png,image/webp" style="display:none" onchange="handleFileInput(this)">`;

    // Actualizar el botón para que se vea activo
    renderStatement();

  } catch(e) {
    setDropZoneStatus("❌ Error leyendo archivo: " + e.message, "#f87171");
  }
}

function analyzeText() {
  // Si hay mensajes preparados de un archivo, usarlos
  if (S.pendingMessages) {
    callAI(S.pendingMessages);
    return;
  }
  showToast("Primero sube un archivo de estado de cuenta", "error");

function promptExtract() {
  return `Analiza este estado de cuenta bancario. Tu tarea: extraer ÚNICAMENTE los cargos/compras (NO incluyas abonos, pagos, ni transferencias de pago al banco).

Para cada cargo extrae:
- name: nombre limpio del comercio (sin RFC, sin ciudad, sin MX)

- category: UNA de estas: Alimentación, Transporte, Entretenimiento, Salud, Ropa, Hogar, Tecnología, Servicios, Educación, Otros

IMPORTANTE: Responde ÚNICAMENTE con JSON válido, sin texto adicional, sin markdown, sin explicaciones. Formato exacto:

function getApiKey() { return "via-webhook"; }
function saveApiKey() {}

async function callAI(messages) {
  S.processing=true; S.aiError=null; renderStatement();

  // Truncar mensajes de texto muy largos para no exceder límite del webhook
  const safeMessages = messages.map(m => {
    if (m.type === "text" && m.text && m.text.length > 6000) {
      return { ...m, text: m.text.slice(0, 6000) };
    }
    return m;
  });

  let data=null, errMsg=null;
  try {
    const body = JSON.stringify({ action:"analyze_ai", user:S.user, messages: safeMessages });
    const res = await fetch(WEBHOOK, {
      method:"POST",
      headers:{ "Content-Type":"text/plain" },
      body
    });
    if (!res.ok) throw new Error("HTTP " + res.status);
    data = await res.json();
    if (data?.error) errMsg = data.error;
  } catch(e) { errMsg = e.message; }
  S.processing=false;

  if (errMsg || !data) {
    S.aiError = errMsg||"Error de conexión con el webhook";
    showToast("❌ " + S.aiError,"error"); renderStatement(); return;
  }

  const raw=(data.content||[]).map(b=>b.text||"").join("").trim();
  S.aiRawResponse = raw;

  let parsed=null;
  try {
    let clean = raw.replace(/```json\s*/gi,"").replace(/```\s*/gi,"").trim();
    try { parsed = JSON.parse(clean); } catch {}
    if (!parsed) {
      const s=clean.indexOf("{"), e=clean.lastIndexOf("}");
      if(s!==-1&&e!==-1) try{ parsed=JSON.parse(clean.slice(s,e+1)); }catch{}
    }
    if (!parsed) {
      const s=clean.indexOf("["), e=clean.lastIndexOf("]");
      if(s!==-1&&e!==-1) try{ parsed={transactions:JSON.parse(clean.slice(s,e+1))}; }catch{}
    }
  } catch {}

  if (!parsed?.transactions?.length) {
    S.aiError = `Sin transacciones. Respuesta: "${raw.slice(0,300)}"`;
    showToast("⚠️ No se encontraron transacciones","error"); renderStatement(); return;
  }

  S.aiError = null; S.aiRawResponse = null;
  S.pendingTxs={
    bank:S.bank,
    txs:parsed.transactions.map(t=>({ id:uid(), name:t.name||t.description||"?", amount:Number(t.amount)||0, category:t.category||"Otros" })).filter(t=>t.amount>0)
  };
  showToast(`✅ ${S.pendingTxs.txs.length} movimientos detectados`,"success");
  renderStatement();
}

function cancelPending() { S.pendingTxs=null; S.pendingMessages=null; renderStatement(); }

async function confirmExport(mode="individual") {
  const ptx=S.pendingTxs; if(!ptx)return;
  const bk=bankInfo(ptx.bank);
  const total=ptx.txs.reduce((s,t)=>s+t.amount,0);

  let newExpenses=[];

  if (mode==="single") {
    // ONE expense entry with the full total
    newExpenses=[{
      id:uid(),
      name:`Tarjeta ${bk.label} — ${MONTHS[S.month]} ${CUR_YEAR}`,
      amount: Math.round(total*100)/100,
      type:"variable",
      category:"Servicios",
      frecuencia:"mensual",
      month:S.month,
      fromStatement:true,
    }];
  } else {
    // Each transaction as individual expense
    newExpenses=ptx.txs.map(t=>({
      id:uid(), name:t.name, amount:t.amount, type:"variable",
      category:t.category, frecuencia:"mensual", month:S.month, fromStatement:true,
    }));
  }

  S.expenses.push(...newExpenses);

  const stmt={
    id:uid(), bank:ptx.bank, bankName:bk.label,
    date:new Date().toLocaleDateString("es-MX"),
    month:S.month, txs:ptx.txs, total,
  };
  S.statements.unshift(stmt);
  S.pendingTxs=null;

  renderAll();
  const msg = mode==="single"
    ? `✅ 1 gasto "Tarjeta ${bk.label}" exportado ($${fmtMXN(total)})`
    : `✅ ${newExpenses.length} gastos individuales exportados`;
  showToast(msg,"success");

  for (const exp of newExpenses) await api("add_expense",{expense:exp});
  await api("add_statement",{statement:stmt});
  setTab("expenses");
}

  const rows = cats.map(([name, meta]) => `
    <div onclick="selectCat('${pre}','${name}')"
      style="display:flex;align-items:center;gap:8px;padding:7px 10px;cursor:pointer;border-radius:6px;background:${name===selected?'var(--accent)22':'transparent'};transition:background .1s"

        onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--t3)'">✕</button>
    </div>`).join('');

  const picker = document.createElement('div');
  picker.id = 'catPickerOverlay';
  picker.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999`;
  picker.innerHTML = `
    <div id="catPickerBox" style="position:fixed;left:${Math.min(rect.left, window.innerWidth-220)}px;top:${rect.bottom+4}px;
      width:210px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;
      box-shadow:0 8px 32px #0008;z-index:10000;overflow:hidden">
      <div style="max-height:240px;overflow-y:auto;padding:6px">${rows}</div>

          <button onclick="addNewCat()" class="btn btn-acc" style="padding:5px 10px;font-size:12px">+</button>
        </div>
      </div>
    </div>`;
  picker.addEventListener('click', function(e) {
    if (!document.getElementById('catPickerBox')?.contains(e.target)) closeCatPicker();
  });

  // Solo Escape para cerrar
  picker.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeCatPicker();
  });

  // Escape global
  document._catKeyHandler = function(e) {
    if (!document.getElementById('catPickerOverlay')) return;
    if (e.key === 'Escape') closeCatPicker();
  };
  document.addEventListener('keydown', document._catKeyHandler);
  document.body.appendChild(picker);
  setTimeout(() => document.getElementById('newCatName')?.focus(), 50);
}

function closeCatPicker() {
  document.getElementById('catPickerOverlay')?.remove();
  if (document._catKeyHandler) {
    document.removeEventListener('keydown', document._catKeyHandler);
    document._catKeyHandler = null;
  }
}

function openCalendarPicker(pre) {
  document.getElementById('dayPickerOverlay')?.remove();
  
  const anchor = document.getElementById(pre + 'eDayDisplay');
  const rect = anchor ? anchor.getBoundingClientRect() : { left:0, bottom:0 };
  const currentDay = parseInt(document.getElementById(pre + 'eDayDisplay')?.value) || 1;
  
  if (!window._calState) {
    const today = new Date();
    window._calState = { month: today.getMonth(), year: today.getFullYear() };
  }
  
  const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dayLabels = ['Do','Lu','Ma','Mi','Ju','Vi','Sa'];
  
  function renderDays(month, year) {
    const firstDay = new Date(year, month, 1);
    const lastDay = new Date(year, month + 1, 0);
    const daysInMonth = lastDay.getDate();
    const startDay = firstDay.getDay();
    const today = new Date();
    const isCurrentMonth = month === today.getMonth() && year === today.getFullYear();
    
    let html = '';
    
    // Empty cells
    for (let i = 0; i < startDay; i++) {
      html += `<div></div>`;
    }
    
    // Days
    for (let d = 1; d <= daysInMonth; d++) {
      const isSelected = d === currentDay;
      const isToday = isCurrentMonth && d === today.getDate();
      
      html += `<button onclick="selectDay('${pre}',${d})" style="aspect-ratio:1;border:none;background:${isSelected?'var(--accent)':'transparent'};color:${isSelected?'#fff':'var(--t1)'};cursor:pointer;border-radius:10px;font-size:13px;font-weight:${isSelected?'700':'500'};transition:all .15s;display:flex;align-items:center;justify-content:center;border:${isToday && !isSelected?'2px solid var(--accent)':'none'};padding:0;line-height:1" onmouseover="if(!${isSelected})this.style.background='var(--accent)15'" onmouseout="if(!${isSelected})this.style.background='transparent'">${d}</button>`;
    }
    
    return html;
  }
  
  const picker = document.createElement('div');
  picker.id = 'dayPickerOverlay';
  picker.style.cssText = `position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999`;
  
  picker.innerHTML = `
    <div style="position:fixed;left:${Math.min(rect.left, window.innerWidth-360)}px;top:${rect.bottom+8}px;
      width:340px;background:var(--bg-card);border:1px solid var(--border);border-radius:14px;
      box-shadow:0 16px 56px #0024;z-index:10000;padding:24px;backdrop-filter:blur(10px)">
      
      <!-- Header -->
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;gap:12px">
        <button id="prevBtn" onclick="window._calState.month=(window._calState.month-1+12)%12;if(window._calState.month===11)window._calState.year--;updateCalendarPicker('${pre}')" style="background:var(--accent)12;border:1px solid var(--border);cursor:pointer;padding:6px 12px;border-radius:8px;color:var(--accent);font-size:16px;transition:all .15s;width:36px;height:36px;display:flex;align-items:center;justify-content:center" onmouseover="this.style.background='var(--accent)22'" onmouseout="this.style.background='var(--accent)12'">◀</button>
        
        <div id="calHeader" style="text-align:center;flex:1">
          <div id="calendarMonth" style="font-size:16px;font-weight:700;color:var(--t1)">${monthNames[window._calState.month]}</div>
          <div id="calendarYear" style="font-size:12px;color:var(--t3);margin-top:4px">${window._calState.year}</div>
        </div>
        
        <button id="nextBtn" onclick="window._calState.month=(window._calState.month+1)%12;if(window._calState.month===0)window._calState.year++;updateCalendarPicker('${pre}')" style="background:var(--accent)12;border:1px solid var(--border);cursor:pointer;padding:6px 12px;border-radius:8px;color:var(--accent);font-size:16px;transition:all .15s;width:36px;height:36px;display:flex;align-items:center;justify-content:center" onmouseover="this.style.background='var(--accent)22'" onmouseout="this.style.background='var(--accent)12'">▶</button>
      </div>
      
      <!-- Day labels -->
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px;margin-bottom:12px">
        ${dayLabels.map(d => `<div style="text-align:center;font-size:11px;font-weight:700;color:var(--t3);padding:4px;text-transform:uppercase;letter-spacing:.5px">${d}</div>`).join('')}
      </div>
      
      <!-- Days grid -->
      <div id="calendarGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:8px">
        ${renderDays(window._calState.month, window._calState.year)}
      </div>
    </div>`;
  
  picker.addEventListener('click', function(e) {
    if (e.target === picker) closeCalendarPicker();
  });
  
  document.body.appendChild(picker);
}

function selectCat(pre, name) {
  const meta = CATEGORIES[name] || { icon:'📦', color:'#94a3b8' };
  // Support both naming conventions: pre+'eCat' (add form) and pre+'cat' (edit form)
  const hiddenInput = document.getElementById(pre + 'eCat') || document.getElementById(pre + 'cat');
  const iconEl      = document.getElementById(pre + 'eCatIcon') || document.getElementById(pre + 'CatIcon');
  const labelEl     = document.getElementById(pre + 'eCatLabel') || document.getElementById(pre + 'CatLabel');
  if (hiddenInput) hiddenInput.value = name;
  if (iconEl)      iconEl.textContent = meta.icon;
  if (labelEl)     labelEl.textContent = name;
  closeCatPicker();
}

function deleteCat(name) {
  // Inline confirm inside the picker (avoid browser confirm() issues)
  const existing = document.getElementById('catDeleteConfirm');
  if (existing) existing.remove();
  const box = document.getElementById('catPickerBox');
  if (!box) return;
  const div = document.createElement('div');
  div.id = 'catDeleteConfirm';
  div.style.cssText = 'padding:10px;border-top:1px solid var(--border);background:var(--bg)';
  div.innerHTML = `<div style="font-size:11px;color:var(--t2);margin-bottom:8px">¿Eliminar <b style="color:#ef4444">${name}</b>?</div>
    <div style="display:flex;gap:6px">
      <button onclick="document.getElementById('catDeleteConfirm').remove()" 
        style="flex:1;padding:5px;border-radius:6px;border:1px solid var(--border);background:var(--bg-input);color:var(--t2);font-size:11px;cursor:pointer">Cancelar</button>
      <button onclick="confirmDeleteCat('${name}')"
        style="flex:1;padding:5px;border-radius:6px;border:none;background:#ef4444;color:#fff;font-size:11px;cursor:pointer;font-weight:700">Eliminar</button>
    </div>`;
  box.appendChild(div);
}

function catTriggerKey(e, pre) {
  const key = e.key;
  if (key === 'Enter' || key === ' ') { e.preventDefault(); openCatPicker(pre); return; }
  if (key === 'Escape') { closeCatPicker(); return; }
  if (key.length !== 1) return;
  e.preventDefault();
  // Seleccionar directamente por letra sin abrir el picker
  const names  = Object.keys(CATEGORIES).sort((a,b) => a.localeCompare(b));
  const cur    = document.getElementById(pre + 'eCat')?.value || '';
  const curIdx = names.findIndex(n => n === cur);
  const search = [...names.slice(curIdx + 1), ...names.slice(0, curIdx + 1)];
  const match  = search.find(n => n.toLowerCase().startsWith(key.toLowerCase()));
  if (match) selectCat(pre, match);
}

function confirmDeleteCat(name) {
  delete CATEGORIES[name];
  // If selected category was deleted, reset to first available
  const pre = _catPickerPre;
  const current = document.getElementById(pre + 'eCat')?.value;
  if (current === name) {
    const first = Object.keys(CATEGORIES)[0] || 'Otros';
    selectCat(pre, first);
  }
  openCatPicker(pre); // refresh picker
  renderAll();
  saveCategories();
}

function addNewCat() {
  const input = document.getElementById('newCatName');
  const name  = input?.value.trim();
  if (!name) return;
  if (CATEGORIES[name]) { showToast('Esa categoría ya existe','error'); return; }
  const color = CAT_COLORS[Object.keys(CATEGORIES).length % CAT_COLORS.length];
  const icon  = CAT_ICONS[Object.keys(CATEGORIES).length % CAT_ICONS.length];
  CATEGORIES[name] = { color, icon };
  selectCat(_catPickerPre, name);
  renderAll();
  saveCategories();
}

function saveCategories() {
  try { localStorage.setItem('categories_' + S.user, JSON.stringify(CATEGORIES)); } catch(e) {}
  api("save_categories", { categories: CATEGORIES });
}

function loadCategoriesLocal() {
  try {
    const raw = localStorage.getItem('categories_' + S.user);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && typeof parsed === 'object' && Object.keys(parsed).length > 0) {
        CATEGORIES = parsed;
      }
    }
  } catch(e) {}
}

// ════════════════════════════════════════════════════════════
//  DAY PICKER (context-aware: mensual=calendar, semanal=weekdays, quincenal=halves)
// ════════════════════════════════════════════════════════════
let _dayPickerPre = '';
let _dayPickerMonOffset = 0;

function openDayPicker(pre) {
  _dayPickerPre = pre;
  _dayPickerMonOffset = 0;
  document.getElementById('dayPickerOverlay')?.remove();
  const freq = document.getElementById(pre + 'eFreq')?.value || 'mensual';
  if (freq === 'diaria') return; // no picker needed
  if (freq === 'semanal')   return openWeekdayPicker(pre);
  if (freq === 'quincenal') return openQuincenaPicker(pre);
  renderDayPicker(pre); // mensual/personalizada → calendar
}

function openWeekdayPicker(pre) {
  openMultiDayCalendar(pre, 6, '¿Qué días del mes? (máx 6)');
}

function openQuincenaPicker(pre) {
  openMultiDayCalendar(pre, 3, '¿Qué días del mes? (máx 3)');
}

function openMultiDayCalendar(pre, maxSel, title) {
  document.getElementById('dayPickerOverlay')?.remove();
  _dayPickerPre = pre;
  _dayPickerMonOffset = 0;
  renderMultiCalendar(pre, maxSel, title);
}

function renderMultiCalendar(pre, maxSel, title) {
  document.getElementById('dayPickerOverlay')?.remove();
  const anchor = document.getElementById(pre+'eDayDisplay');
  const rect   = anchor ? anchor.getBoundingClientRect() : {left:0,bottom:0};

  const now   = new Date();
  const absM  = now.getMonth() + _dayPickerMonOffset;
  const yr    = now.getFullYear() + Math.floor(absM/12);
  const mon   = ((absM%12)+12)%12;
  const dim   = new Date(yr, mon+1, 0).getDate();
  const firstDow = new Date(yr, mon, 1).getDay();
  const mName = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][mon];

  // Parse currently selected days
  const raw = document.getElementById(pre+'eDay')?.value || '';
  const selected = new Set(raw.split(',').map(Number).filter(Boolean));

  let cells = ['D','L','M','M','J','V','S'].map(d=>
    `<div style="font-size:9px;color:var(--t3);text-align:center;font-weight:700;padding:3px 0">${d}</div>`
  ).join('');
  for(let i=0;i<firstDow;i++) cells+='<div></div>';
  for(let d=1;d<=dim;d++){
    const isSel = selected.has(d);
    const isToday = d===now.getDate()&&mon===now.getMonth()&&yr===now.getFullYear();
    const canSel = isSel || selected.size < maxSel;
    cells += `<div onclick="toggleMultiDay(${d},'${pre}',${maxSel},'${title.replace(/'/g,'\\\'')}')"
      style="text-align:center;padding:5px 2px;border-radius:6px;font-size:12px;font-weight:${isSel?700:400};
      cursor:${canSel?'pointer':'not-allowed'};
      background:${isSel?'var(--accent)':isToday?'#ffffff12':'transparent'};
      color:${isSel?'#000':!canSel?'var(--t3)':isToday?'var(--accent)':'var(--t1)'};
      border:1px solid ${isSel?'var(--accent)':isToday?'var(--accent)44':'transparent'};

  }

  const selLabel = selected.size ? [...selected].sort((a,b)=>a-b).join(', ') : '—';

  const overlay = document.createElement('div');
  overlay.id = 'dayPickerOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999';
  overlay.innerHTML = `
    <div id="dayPickerBox" style="position:fixed;left:${Math.min(rect.left,window.innerWidth-240)}px;top:${rect.bottom+4}px;
      width:230px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
      box-shadow:0 8px 32px #0009;z-index:10000;padding:12px">
      <div style="font-size:10px;color:var(--t3);margin-bottom:8px;font-weight:700">${title}</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <button onclick="event.stopPropagation();_dayPickerMonOffset--;renderMultiCalendar('${pre}',${maxSel},'${title.replace(/'/g,"\\'")}');"
          style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px">‹</button>
        <span style="font-size:11px;font-weight:700;color:var(--t1)">${mName} ${yr}</span>
        <button onclick="event.stopPropagation();_dayPickerMonOffset++;renderMultiCalendar('${pre}',${maxSel},'${title.replace(/'/g,"\\'")}');"
          style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
      <div style="margin-top:10px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);padding-top:8px">
        <span style="font-size:11px;color:var(--t3)">Días: <b style="color:var(--accent)">${selLabel}</b></span>
        <button onclick="confirmMultiDay('${pre}')"
          style="padding:5px 12px;border-radius:7px;background:var(--accent);color:#000;border:none;font-size:11px;font-weight:700;cursor:pointer">OK</button>
      </div>
    </div>`;
  overlay.addEventListener('click', e => {
    if(!document.getElementById('dayPickerBox')?.contains(e.target)) closeDayPicker();
  });
  document.body.appendChild(overlay);
}

function toggleMultiDay(day, pre, maxSel, title) {
  const hidden = document.getElementById(pre+'eDay');
  const raw = hidden?.value || '';
  const selected = new Set(raw.split(',').map(Number).filter(Boolean));
  if (selected.has(day)) selected.delete(day);
  else if (selected.size < maxSel) selected.add(day);
  if (hidden) hidden.value = [...selected].sort((a,b)=>a-b).join(',');
  renderMultiCalendar(pre, maxSel, title);
}

function confirmMultiDay(pre) {
  const hidden  = document.getElementById(pre+'eDay');
  const display = document.getElementById(pre+'eDayDisplay');
  const val     = hidden?.value || '1';
  const days    = val.split(',').filter(Boolean);
  if (display) display.value = days.length > 1 ? days.join(',') : (days[0]||'1');
  closeDayPicker();
}

function renderDayPicker(pre) {
  document.getElementById('dayPickerOverlay')?.remove();
  const anchor = document.getElementById(pre + 'eDayDisplay');
  const rect   = anchor ? anchor.getBoundingClientRect() : { left: 0, bottom: 0 };
  const selected = parseInt(document.getElementById(pre + 'eDay')?.value || '1');

  const now  = new Date();
  const absM = now.getMonth() + _dayPickerMonOffset;
  const yr   = now.getFullYear() + Math.floor(absM / 12);
  const mon  = ((absM % 12) + 12) % 12;
  const dim  = new Date(yr, mon + 1, 0).getDate();
  const firstDow = new Date(yr, mon, 1).getDay();
  const monthName = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"][mon];

  let cells = '';
  ['D','L','M','M','J','V','S'].forEach(d => {
    cells += `<div style="font-size:9px;color:var(--t3);text-align:center;font-weight:700;padding:3px 0">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) cells += '<div></div>';
  for (let d = 1; d <= dim; d++) {
    const isSelected = d === selected;
    const isToday = d === now.getDate() && mon === now.getMonth() && yr === now.getFullYear();
    cells += `<div onclick="selectDay('${pre}',${d})"
      style="text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:${isSelected?700:400};
      background:${isSelected?'var(--accent)':isToday?'#ffffff12':'transparent'};
      color:${isSelected?'#000':isToday?'var(--accent)':'var(--t1)'};
      border:1px solid ${isSelected?'var(--accent)':isToday?'var(--accent)44':'transparent'}"
      onmouseover="if(!${isSelected})this.style.background='var(--accent)22'"
      onmouseout="if(!${isSelected})this.style.background='${isToday?'#ffffff12':'transparent'}'">${d}</div>`;
  }

  const overlay = document.createElement('div');
  overlay.id = 'dayPickerOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999';
  overlay.innerHTML = `
    <div id="dayPickerBox" style="position:fixed;left:${Math.min(rect.left,window.innerWidth-230)}px;top:${rect.bottom+4}px;
      width:220px;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;
      box-shadow:0 8px 32px #0009;z-index:10000;padding:12px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <button onclick="event.stopPropagation();_dayPickerMonOffset--;renderDayPicker('${pre}')"
          style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px"
          onmouseover="this.style.background='var(--accent)22'" onmouseout="this.style.background='none'">‹</button>
        <span style="font-size:12px;font-weight:700;color:var(--t1)">${monthName} ${yr}</span>
        <button onclick="event.stopPropagation();_dayPickerMonOffset++;renderDayPicker('${pre}')"
          style="background:none;border:none;color:var(--t2);cursor:pointer;font-size:16px;padding:2px 8px;border-radius:6px"
          onmouseover="this.style.background='var(--accent)22'" onmouseout="this.style.background='none'">›</button>
      </div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells}</div>
      <div style="margin-top:8px;font-size:10px;color:var(--t3);text-align:center">Selecciona el día de pago mensual</div>
    </div>`;
  overlay.addEventListener('click', e => {
    if (!document.getElementById('dayPickerBox')?.contains(e.target)) closeDayPicker();
  });
  document.body.appendChild(overlay);
}

function validateDayInput(el, pre) {
  const dim = new Date(new Date().getFullYear(), new Date().getMonth()+1, 0).getDate();
  let val = parseInt(el.value) || 1;
  if (val < 1) val = 1;
  if (val > dim) val = dim;
  el.value = val;
  const hidden = document.getElementById(pre + 'eDay');
  if (hidden) hidden.value = val;
}

function selectDay(pre, day) {
  const hidden  = document.getElementById(pre + 'eDay');
  const display = document.getElementById(pre + 'eDayDisplay');
  if (hidden) hidden.value = String(day);
  if (display) {
    const freq = document.getElementById(pre + 'eFreq')?.value || 'mensual';
    if (freq === 'semanal') {
      const names = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
      // display is a div for semanal/quincenal, input for mensual
      if (display.tagName === 'INPUT') display.value = names[day] || day;
      else display.textContent = names[day] || day;
    } else if (freq === 'quincenal') {
      const label = String(day).includes(',') ? String(day).replace(',', ' y ') : `Día ${day}`;
      if (display.tagName === 'INPUT') display.value = label;
      else display.textContent = label;
    } else {
      if (display.tagName === 'INPUT') display.value = day;
      else display.textContent = day;
    }
  }
  closeDayPicker();
}

// ════════════════════════════════════════════════════════════
//  MINI CALENDAR PICKER — pasa referencias DOM directas
// ════════════════════════════════════════════════════════════
let _miniCalMonOffset = 0;
let _miniCalHidden    = null;   // referencia al input hidden
let _miniCalDisplay   = null;   // referencia al input visible

let _miniCalLockMonth = false;

function openMiniCal(displayEl, hiddenEl, lockMonth) {
  document.getElementById('dayPickerOverlay')?.remove();
  _miniCalMonOffset = 0;
  _miniCalHidden    = hiddenEl;
  _miniCalDisplay   = displayEl;
  _miniCalLockMonth = !!lockMonth;
  _renderMiniCal(displayEl);
}

function _renderMiniCal(anchor) {
  document.getElementById('dayPickerOverlay')?.remove();
  const rect = anchor ? anchor.getBoundingClientRect() : { left: 0, bottom: 0 };

  const now  = new Date();
  const absM = now.getMonth() + _miniCalMonOffset;
  const yr   = now.getFullYear() + Math.floor(absM / 12);
  const mon  = ((absM % 12) + 12) % 12;
  const dim  = new Date(yr, mon + 1, 0).getDate();
  const firstDow = new Date(yr, mon, 1).getDay();
  const mNames = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
  const mName = mNames[mon];

  // Parse selected: stored as YYYY-MM-DD or plain number
  const raw = _miniCalHidden?.value || '';
  let selDay = 0, selMon = -1, selYr = -1;
  if (/\d{4}-\d{2}-\d{2}/.test(raw)) {
    const p = raw.split('-');
    selYr = parseInt(p[0]); selMon = parseInt(p[1])-1; selDay = parseInt(p[2]);
  } else {
    selDay = parseInt(raw) || 0; selMon = now.getMonth(); selYr = now.getFullYear();
  }
  const isCurrentViewMonth = (selMon === mon && selYr === yr);

  let cells = '';
  ['D','L','M','M','J','V','S'].forEach(d => {
    cells += `<div style="font-size:9px;color:var(--t3);text-align:center;font-weight:700;padding:3px 0">${d}</div>`;
  });
  for (let i = 0; i < firstDow; i++) cells += '<div></div>';
  for (let d = 1; d <= dim; d++) {
    const isSel   = isCurrentViewMonth && d === selDay;
    const isToday = d === now.getDate() && mon === now.getMonth() && yr === now.getFullYear();
    cells += `<div data-day="${d}" data-mon="${mon}" data-yr="${yr}" style="text-align:center;padding:5px 2px;border-radius:6px;cursor:pointer;font-size:12px;
      font-weight:${isSel?700:400};
      background:${isSel?'var(--accent)':isToday?'#ffffff12':'transparent'};
      color:${isSel?'#000':isToday?'var(--accent)':'var(--t1)'};
      border:1px solid ${isSel?'var(--accent)':isToday?'var(--accent)44':'transparent'}"
      onmouseover="if(!${isSel})this.style.background='var(--accent)22'"
      onmouseout="if(!${isSel})this.style.background='${isToday?'#ffffff12':'transparent'}'">${d}</div>`;
  }

  const lx = Math.min(rect.left, window.innerWidth - 240);
  const ly = Math.min(rect.bottom + 4, window.innerHeight - 320);

  const overlay = document.createElement('div');
  overlay.id = 'dayPickerOverlay';
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999';
  overlay.innerHTML = `
    <div id="dayPickerBox" style="position:fixed;left:${lx}px;top:${ly}px;
      width:228px;background:var(--bg-card);border:1px solid var(--border-hi);border-radius:14px;
      box-shadow:0 16px 48px #000d;z-index:10000;padding:14px;backdrop-filter:blur(8px)">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <button id="_mcPrev" style="background:var(--accent)12;border:1px solid var(--border);color:var(--accent);cursor:pointer;
          font-size:15px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#8249;</button>
        <div style="text-align:center">
          <div style="font-size:13px;font-weight:700;color:var(--t1)">${mName} ${yr}</div>
          <div style="font-size:10px;color:var(--t3)">${_miniCalLockMonth?'Día de pago mensual':'Selecciona fecha'}</div>
        </div>
        <button id="_mcNext" style="background:var(--accent)12;border:1px solid var(--border);color:var(--accent);cursor:pointer;
          font-size:15px;width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0">&#8250;</button>
      </div>
      <div id="_mcGrid" style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px">${cells}</div>
      <div style="margin-top:8px;font-size:10px;color:var(--t3);text-align:center">&#128197; Selecciona el dia</div>
    </div>`;

  overlay.querySelector('#_mcPrev').addEventListener('click', e => {
    e.stopPropagation(); _miniCalMonOffset--; _renderMiniCal(_miniCalDisplay);
  });
  overlay.querySelector('#_mcNext').addEventListener('click', e => {
    e.stopPropagation(); _miniCalMonOffset++; _renderMiniCal(_miniCalDisplay);
  });

  // Day cells — always store YYYY-MM-DD in hidden for proper persistence
  overlay.querySelector('#_mcGrid').addEventListener('click', e => {
    const cell = e.target.closest('[data-day]');
    if (!cell) return;
    const d = parseInt(cell.dataset.day);
    const m = parseInt(cell.dataset.mon);
    const y = parseInt(cell.dataset.yr);
    const isoDate = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isNowMonth = m === now.getMonth() && y === now.getFullYear();
    const mns = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
    if (_miniCalLockMonth && isNowMonth) {
      // Recurrente + mes actual: solo guardar día (no necesita fechaUnica)
      if (_miniCalHidden)  _miniCalHidden.value  = String(d);
      if (_miniCalDisplay) _miniCalDisplay.value = String(d);
    } else {
      // Otro mes o no recurrente: guardar fecha completa
      const label = isNowMonth ? String(d) : d + ' ' + mns[m];
      if (_miniCalHidden)  _miniCalHidden.value  = isoDate;
      if (_miniCalDisplay) _miniCalDisplay.value = label;
    }
    _miniCalMonOffset = 0;
    document.getElementById('dayPickerOverlay')?.remove();
  });

  overlay.addEventListener('click', e => {
    if (!document.getElementById('dayPickerBox')?.contains(e.target)) {
      _miniCalMonOffset = 0;
      document.getElementById('dayPickerOverlay')?.remove();
    }
  });

  document.body.appendChild(overlay);
}

function closeDayPicker() {
  document.getElementById('dayPickerOverlay')?.remove();
}

//  ANÁLISIS: Metas · Comparativo · Alertas · Exportar PDF

function renderAnalisis() {
  const el = document.getElementById("panel-analisis");
  if (!el) return;

  const tI = totalIncome();
  const tE = totalExpense();
  const bal = tI - tE;

  // ── 1. COMPARATIVO MES A MES ─────────────────────────────
  const compMonths = [];
  for (let off = -5; off <= 0; off++) {
    const absM = CUR_MONTH + off;
    const mon  = ((absM % 12) + 12) % 12;
    const yr   = CUR_YEAR + Math.floor(absM / 12);
    const mExp = S.expenses.filter(e => e.month === mon);
    const mInc = totalIncome(); // ingresos son fijos por ahora
    const mGas = mExp.reduce((s,e) => s + toMonthly(e.amount, e.frecuencia||"mensual"), 0);
    compMonths.push({ label: MONTHS[mon], mon, yr, inc: mInc, gas: mGas, bal: mInc - mGas });
  }
  const maxVal = Math.max(...compMonths.map(m => Math.max(m.inc, m.gas)), 1);
  const barH = 100;
  const compBars = compMonths.map((m, i) => {
    const iH = Math.round((m.inc / maxVal) * barH);
    const gH = Math.round((m.gas / maxVal) * barH);
    const isCur = i === compMonths.length - 1;
    return `<div style="display:flex;flex-direction:column;align-items:center;flex:1;gap:4px">
      <div style="font-size:9px;color:var(--t3);font-family:'JetBrains Mono',monospace;text-align:center">
        ${m.bal >= 0 ? '+' : ''}$${fmtMXN(Math.abs(m.bal))}
      </div>
      <div style="display:flex;gap:3px;align-items:flex-end;height:${barH}px">
        <div title="Ingresos $${fmtMXN(m.inc)}" style="width:16px;height:${iH}px;background:#22c55e;border-radius:3px 3px 0 0;transition:height .5s;opacity:${isCur?1:.7}"></div>
        <div title="Gastos $${fmtMXN(m.gas)}" style="width:16px;height:${gH}px;background:#ef4444;border-radius:3px 3px 0 0;transition:height .5s;opacity:${isCur?1:.7}"></div>
      </div>
      <div style="font-size:10px;font-weight:${isCur?700:400};color:${isCur?'var(--accent)':'var(--t3)'}">${m.label}</div>
    </div>`;
  }).join('');

  // ── 2. META DE AHORRO ────────────────────────────────────
  const meta = S.metaAhorro;
  const metaPct = meta ? Math.min(100, Math.round((bal / meta.monto) * 100)) : 0;
  const metaColor = metaPct >= 100 ? '#22c55e' : metaPct >= 60 ? '#f59e0b' : '#ef4444';
  const metaSection = `
    <div class="card" style="border:1px solid #22c55e33">
      <div class="flex jb ai" style="margin-bottom:14px">
        <div class="section-title" style="margin-bottom:0">🎯 Meta de ahorro mensual</div>
        ${meta ? `<button onclick="S.metaAhorro=null;renderAnalisis()" style="background:none;border:none;color:var(--t3);cursor:pointer;font-size:11px">Quitar meta</button>` : ''}
      </div>
      ${meta ? `
        <div style="text-align:center;margin-bottom:14px">
          <div style="font-size:11px;color:var(--t3);margin-bottom:4px">${meta.label || 'Meta'}</div>
          <div class="mono" style="font-size:28px;font-weight:800;color:${metaColor}">${metaPct}%</div>
          <div style="font-size:11px;color:var(--t3)">$${fmtMXN(Math.max(0,bal))} de $${fmtMXN(meta.monto)}</div>
        </div>
        <div style="background:#1a2d44;border-radius:8px;height:12px;overflow:hidden;margin-bottom:10px">
          <div style="height:100%;width:${metaPct}%;background:linear-gradient(90deg,${metaColor},${metaColor}99);border-radius:8px;transition:width .8s ease"></div>
        </div>
        ${metaPct >= 100 ? '<div style="text-align:center;font-size:13px">🎉 ¡Meta alcanzada este mes!</div>' :
          `<div style="font-size:11px;color:var(--t3);text-align:center">Te faltan $${fmtMXN(meta.monto - Math.max(0,bal))} para alcanzar tu meta</div>`}
      ` : `
        <div style="display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:end">
          <div>
            <div class="kpi-label mb8">Nombre de la meta</div>
            <input class="inp" id="metaLabel" placeholder="Ej. Vacaciones, Fondo, Ahorro..." style="width:100%">
          </div>
          <div>
            <div class="kpi-label mb8">Monto ($)</div>
            <input class="inp" id="metaMonto" type="number" placeholder="0.00" style="width:110px">
          </div>
          <button onclick="guardarMeta()" class="btn btn-acc" style="padding:8px 16px">Guardar</button>
        </div>
      `}
    </div>`;

  // ── 3. ALERTAS DE GASTO ──────────────────────────────────
  const alertasHtml = `
    <div class="card" style="border:1px solid #f59e0b33">
      <div class="section-title" style="margin-bottom:14px">🔔 Alertas de gasto</div>
      <div style="display:grid;grid-template-columns:1fr auto auto auto;gap:8px;align-items:end;margin-bottom:14px">
        <div>
          <div class="kpi-label mb8">Concepto o categoría</div>
          <input class="inp" id="alertaNombre" placeholder="Ej. Gasolina, Comida..." style="width:100%">
        </div>
        <div>
          <div class="kpi-label mb8">Límite ($)</div>
          <input class="inp" id="alertaLimite" type="number" placeholder="500" style="width:100px">

          <div class="kpi-label mb8">Categoría</div>
          <select class="sel" id="alertaCat">
            <option value="">Todas</option>
            ${Object.keys(CATEGORIES).sort().map(c=>`<option>${c}</option>`).join('')}
          </select>
        </div>
        <button onclick="agregarAlerta()" class="btn" style="padding:8px 14px;background:#f59e0b;color:#000;border-color:#f59e0b">+ Agregar</button>
      </div>
      ${S.alertas.length === 0
        ? `<div style="color:var(--t3);font-size:12px;text-align:center;padding:16px">Sin alertas configuradas</div>`

            const gastoActual = S.expenses
              .filter(e => e.month === S.month && (!a.categoria || e.category === a.categoria) && (!a.nombre || e.name.toLowerCase().includes(a.nombre.toLowerCase())))
              .reduce((s,e) => s + toMonthly(e.amount, e.frecuencia||'mensual'), 0);

            const col = pct >= 100 ? '#ef4444' : pct >= 80 ? '#f59e0b' : '#22c55e';
            return `<div style="padding:10px 12px;border-radius:8px;background:var(--bg);border:1px solid ${col}33;margin-bottom:8px">
              <div class="flex jb ai" style="margin-bottom:6px">
                <div>
                  <span style="font-size:12px;font-weight:600">${a.nombre || 'Todos'}</span>

              </div>
              ${pct >= 100 ? `<div style="font-size:10px;color:#ef4444;margin-top:4px">⚠️ Límite superado este mes</div>` :
                pct >= 80 ? `<div style="font-size:10px;color:#f59e0b;margin-top:4px">Cerca del límite (${pct}%)</div>` : ''}
            </div>`;
          }).join('')
      }
    </div>`;

  el.innerHTML = `
    <div class="section-title" style="color:${S.userColor};margin-bottom:16px">🎯 Análisis — ${S.user}</div>

    <!-- Comparativo mes a mes -->
    <div class="card mb16">
      <div class="flex jb ai" style="margin-bottom:16px">
        <div class="section-title" style="margin-bottom:0">📈 Comparativo mes a mes</div>
        <div class="flex ai g8">
          <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--t3)"><span style="width:10px;height:10px;background:#22c55e;border-radius:2px;display:inline-block"></span>Ingresos</span>
          <span style="display:inline-flex;align-items:center;gap:4px;font-size:11px;color:var(--t3)"><span style="width:10px;height:10px;background:#ef4444;border-radius:2px;display:inline-block"></span>Gastos</span>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:flex-end;padding:0 8px">${compBars}</div>
    </div>

    <!-- 2 columnas: Meta + Alertas -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      ${metaSection}
      ${alertasHtml}
    </div>

    <!-- Exportar PDF -->
    <div class="card" style="border:1px solid #6366f133">
      <div class="flex jb ai">
        <div>
          <div class="section-title" style="margin-bottom:4px">📄 Exportar reporte</div>
          <div style="font-size:11px;color:var(--t3)">Genera un PDF con el resumen del mes actual</div>
        </div>
        <button onclick="exportarPDF()" class="btn" style="padding:10px 20px;background:#6366f1;color:#fff;border-color:#6366f1;font-weight:700">
          📥 Descargar PDF
        </button>
      </div>
    </div>`;
}

function guardarMeta() {
  const monto = parseFloat(document.getElementById('metaMonto')?.value);
  const label = document.getElementById('metaLabel')?.value?.trim() || 'Meta de ahorro';
  if (!monto || monto <= 0) { showToast('Ingresa un monto válido','error'); return; }
  S.metaAhorro = { monto, label };
  renderAnalisis();
  showToast('🎯 Meta guardada','success');
}

function agregarAlerta() {
  const nombre = document.getElementById('alertaNombre')?.value?.trim();
  const limite = parseFloat(document.getElementById('alertaLimite')?.value);
  const categoria = document.getElementById('alertaCat')?.value;
  if (!limite || limite <= 0) { showToast('Ingresa un límite válido','error'); return; }
  S.alertas.push({ id: uid(), nombre, limite, categoria });
  renderAnalisis();
  showToast('🔔 Alerta guardada','success');
}

function exportarPDF() {
  const tI = totalIncome();
  const tE = totalExpense();
  const bal = tI - tE;
  const me  = monthExpenses();
  const byCat = {};
  me.forEach(e => { byCat[e.category] = (byCat[e.category]||0) + toMonthly(e.amount, e.frecuencia||'mensual'); });

  const rows = Object.entries(byCat).sort((a,b)=>b[1]-a[1]).map(([cat,val]) =>
    `<tr><td>${catMeta(cat).icon} ${cat}</td><td style="text-align:right;color:#ef4444">-$${fmtMXN(val)}</td><td style="text-align:right">${tE>0?Math.round(val/tE*100):0}%</td></tr>`
  ).join('');

  const incRows = S.incomes.map(i =>
    `<tr><td>💼 ${i.name}</td><td style="text-align:right;color:#22c55e">+$${fmtMXN(toMonthly(i.amount,i.frecuencia))}</td><td>${FREQS[i.frecuencia||'mensual']?.label||''}</td></tr>`
  ).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
  <style>
    body{font-family:Arial,sans-serif;color:#1a1a2e;padding:32px;max-width:800px;margin:0 auto}
    h1{color:#f5a623;font-size:28px;margin-bottom:4px}
    h2{font-size:16px;color:#3b82f6;margin:20px 0 8px;border-bottom:2px solid #e5e7eb;padding-bottom:4px}
    .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:16px 0}
    .kpi{border-radius:10px;padding:16px;text-align:center;border:1px solid #e5e7eb}
    .kpi-val{font-size:22px;font-weight:800;margin:4px 0}
    .kpi-lbl{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:.5px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th{background:#f3f4f6;padding:8px 12px;text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#6b7280}
    td{padding:8px 12px;border-bottom:1px solid #f3f4f6}
    .footer{margin-top:32px;font-size:11px;color:#9ca3af;text-align:center}
  </style></head><body>
  <h1>MisFinanzas ${APP_VERSION}</h1>
  <p style="color:#6b7280;margin-top:0">Reporte mensual — ${MONTHS_FULL[S.month]} ${CUR_YEAR}</p>
  <div class="kpis">
    <div class="kpi" style="border-color:#22c55e44"><div class="kpi-lbl">Ingresos</div><div class="kpi-val" style="color:#22c55e">+$${fmtMXN(tI)}</div></div>
    <div class="kpi" style="border-color:#ef444444"><div class="kpi-lbl">Gastos</div><div class="kpi-val" style="color:#ef4444">-$${fmtMXN(tE)}</div></div>
    <div class="kpi" style="border-color:${bal>=0?'#3b82f644':'#ef444444'}"><div class="kpi-lbl">Balance</div><div class="kpi-val" style="color:${bal>=0?'#3b82f6':'#ef4444'}">${bal>=0?'+':''}$${fmtMXN(bal)}</div></div>
  </div>
  <h2>💰 Ingresos</h2>
  <table><thead><tr><th>Fuente</th><th style="text-align:right">Monto/mes</th><th>Frecuencia</th></tr></thead>
  <tbody>${incRows}</tbody></table>
  <h2>💸 Gastos por categoría</h2>
  <table><thead><tr><th>Categoría</th><th style="text-align:right">Total</th><th style="text-align:right">% del gasto</th></tr></thead>
  <tbody>${rows}</tbody></table>
  <div class="footer">Generado el ${new Date().toLocaleDateString('es-MX',{year:'numeric',month:'long',day:'numeric'})} · MisFinanzas ${APP_VERSION}</div>
  </body></html>`;

  const blob = new Blob([html], { type: 'text/html' });
  const url  = URL.createObjectURL(blob);
  const win  = window.open(url, '_blank');
  if (win) {
    win.onload = () => { win.print(); };
    showToast('📄 Reporte listo — usa Ctrl+P para guardar como PDF','info');
  }
}

let _mobileView = false;

function toggleMobileView() {
  _mobileView = !_mobileView;
  const btn = document.getElementById('mobileViewBtn');
  const app = document.getElementById('app');

  if (_mobileView) {
    app.style.maxWidth = '420px';
    app.style.margin   = '0 auto';
    if (btn) {
      btn.textContent       = '🖥️';
      btn.style.background  = 'var(--accent)22';
      btn.style.borderColor = 'var(--accent)';
      btn.title             = 'Vista escritorio';
    }
    // Colapsar grids a 1 columna
    document.querySelectorAll('#panel-overview .g2, #panel-overview .g3').forEach(el => {
      el.dataset.origCols = el.style.gridTemplateColumns;
      el.style.gridTemplateColumns = '1fr';
    });
    document.querySelectorAll('#panel-overview [style*="grid-template-columns:1fr 1fr"]').forEach(el => {
      el.dataset.origStyle = el.getAttribute('style');
      el.style.gridTemplateColumns = '1fr';
    });
    showToast('📱 Vista móvil activada','info');
  } else {
    app.style.maxWidth = '';
    app.style.margin   = '';
    if (btn) {
      btn.textContent       = '📱';
      btn.style.background  = 'var(--bg-input)';
      btn.style.borderColor = 'var(--border-hi)';
      btn.title             = 'Vista móvil';
    }
    document.querySelectorAll('#panel-overview .g2, #panel-overview .g3').forEach(el => {
      if (el.dataset.origCols !== undefined) el.style.gridTemplateColumns = el.dataset.origCols;
    });
    document.querySelectorAll('#panel-overview [data-orig-style]').forEach(el => {
      el.setAttribute('style', el.dataset.origStyle);
    });
    showToast('🖥️ Vista escritorio activada','info');
  }
}

startApp();

// ── Tab en botón Agregar = Enter ──────────────────────────
document.addEventListener("keydown", function(e) {
  if (e.key !== "Tab") return;
  const el = document.activeElement;
  if (!el || el.tagName !== "BUTTON") return;
  if (el.textContent.includes("Agregar") || el.textContent.trim().startsWith("+")) {
    e.preventDefault();
    el.click();
    const form = el.closest(".card") || el.parentElement;
    const firstInput = form ? form.querySelector("input:not([type=hidden])") : null;
    if (firstInput) setTimeout(() => firstInput.focus(), 60);
  }
}, false);

// ── Teclado rápido en <select> ────────────────────────────
// Selects normales: letra → salta a primera opción que empieza con esa letra
// Selects con data-dayselect: número → acumula dígitos (timeout 800ms) y salta al día
let _dayBuf = '', _dayTimer = null;

document.addEventListener("keydown", function(e) {
  const el = document.activeElement;
  if (!el || el.tagName !== "SELECT") return;
  const key = e.key;

  // ── Modo numérico para selects de día ──
  if (el.dataset.dayselect) {
    if (!/^\d$/.test(key)) return; // solo dígitos
    e.preventDefault();
    clearTimeout(_dayTimer);
    _dayBuf += key;
    const num = parseInt(_dayBuf, 10);
    // Buscar opción con valor igual al número acumulado
    const opt = Array.from(el.options).find(o => parseInt(o.value, 10) === num);
    if (opt) {
      el.value = opt.value;
      el.dispatchEvent(new Event("change", { bubbles: true }));
    }
    // Limpiar buffer tras 800ms de inactividad
    _dayTimer = setTimeout(() => { _dayBuf = ''; }, 800);
    return;
  }

  // ── Modo letra para selects normales ──
  const letter = key.toLowerCase();
  if (letter.length !== 1) return;
  e.preventDefault();

  function cleanText(t) {
    return t.trim().replace(/^[^\p{L}\p{N}]+/u, '').toLowerCase();
  }

  const opts  = Array.from(el.options);
  const cur   = el.selectedIndex;
  const search = [...opts.slice(cur + 1), ...opts.slice(0, cur + 1)];
  const match = search.find(o => cleanText(o.text).startsWith(letter));
  if (match) {
    el.value = match.value;
    el.dispatchEvent(new Event("change", { bubbles: true }));
  }
}, true);

</script>
